<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5">
<title>KidCoins — لوحة التحكم</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--teal:#00C4B6;--teal2:#00A89C;--navy:#0D1B2A;--navy2:#0A1520;--navy3:#111F30;
  --gold:#F5C518;--red:#FF5C6C;--green:#22C55E;--slate:#64748B;--border:rgba(255,255,255,.08);--card:rgba(255,255,255,.04);}
html{font-size:16px;}
body{font-family:'Cairo',sans-serif;background:var(--navy);color:#fff;min-height:100vh;line-height:1.6;-webkit-font-smoothing:antialiased;}
[lang="en"] body{font-family:'Inter','Poppins',sans-serif;}
[lang="en"] h1,[lang="en"] h2,[lang="en"] h3{font-family:'Poppins',sans-serif;}
.hide{display:none!important;}

/* ── Top bar ── */
.topbar{position:sticky;top:0;z-index:50;height:60px;padding:0 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;
  background:rgba(13,27,42,.96);backdrop-filter:blur(18px);border-bottom:1px solid rgba(0,196,182,.16);}
.tb-brand{display:flex;align-items:center;gap:9px;}
.tb-logo{height:40px;width:auto;object-fit:contain;filter:drop-shadow(0 3px 8px rgba(0,196,182,.3));}
.tb-title{font-size:.95rem;font-weight:900;}
.tb-title span{color:var(--gold);}
.tb-actions{display:flex;align-items:center;gap:7px;}
.icon-btn{width:36px;height:36px;border-radius:99px;border:1.5px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);
  color:rgba(255,255,255,.7);cursor:pointer;font-size:.85rem;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.icon-btn:hover{background:rgba(255,255,255,.1);color:#fff;}
#langBtn{font-family:'Poppins',sans-serif;font-weight:700;font-size:.72rem;color:var(--teal);border-color:rgba(0,196,182,.35);background:rgba(0,196,182,.08);}

/* ── Layout ── */
.wrap{max-width:960px;margin:0 auto;padding:20px 16px 60px;}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:14px;color:rgba(255,255,255,.5);}
.spinner{width:38px;height:38px;border:3px solid rgba(0,196,182,.2);border-top-color:var(--teal);border-radius:50%;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}

/* ── Family header card ── */
.fam-card{background:linear-gradient(145deg,rgba(0,196,182,.1),rgba(13,27,42,.6));border:1px solid rgba(0,196,182,.2);
  border-radius:20px;padding:18px 20px;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
.fam-name{font-size:1.15rem;font-weight:900;}
.fam-meta{font-size:.72rem;color:rgba(255,255,255,.5);margin-top:2px;}
.fam-code{display:inline-flex;align-items:center;gap:7px;background:rgba(245,197,24,.1);border:1px solid rgba(245,197,24,.28);
  border-radius:99px;padding:6px 13px;cursor:pointer;transition:all .2s;}
.fam-code:hover{background:rgba(245,197,24,.18);}
.fam-code b{font-family:'Poppins',monospace;letter-spacing:2px;color:var(--gold);font-size:.9rem;}
.fam-code small{font-size:.6rem;color:rgba(255,255,255,.45);}

/* ── Section ── */
.sec{margin-bottom:22px;}
.sec-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.sec-head h2{font-size:.95rem;font-weight:800;display:flex;align-items:center;gap:7px;}
.badge{font-size:.6rem;background:rgba(0,196,182,.14);color:var(--teal);border-radius:99px;padding:2px 8px;font-weight:700;}
.badge.warn{background:rgba(245,197,24,.14);color:var(--gold);}

/* ── Buttons ── */
.btn{padding:9px 16px;border-radius:11px;border:none;cursor:pointer;font-family:'Cairo','Poppins',sans-serif;
  font-size:.82rem;font-weight:800;transition:all .2s;display:inline-flex;align-items:center;gap:6px;}
.btn-primary{background:linear-gradient(135deg,var(--teal),var(--teal2));color:var(--navy);box-shadow:0 4px 14px rgba(0,196,182,.3);}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 22px rgba(0,196,182,.42);}
.btn-ghost{background:rgba(255,255,255,.05);border:1px solid var(--border);color:rgba(255,255,255,.75);}
.btn-ghost:hover{background:rgba(255,255,255,.1);}
.btn-sm{padding:6px 12px;font-size:.74rem;border-radius:9px;}
.btn-green{background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.35);color:#4ADE80;}
.btn-green:hover{background:rgba(34,197,94,.25);}
.btn-red{background:rgba(255,92,108,.13);border:1px solid rgba(255,92,108,.32);color:#FF8593;}
.btn-red:hover{background:rgba(255,92,108,.22);}

/* ── Children grid ── */
.kids{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;}
.kid{background:var(--navy3);border:1px solid var(--border);border-radius:18px;padding:16px;cursor:pointer;transition:all .22s;position:relative;overflow:hidden;}
.kid:hover{border-color:rgba(0,196,182,.35);transform:translateY(-3px);box-shadow:0 10px 26px rgba(0,0,0,.3);}
.kid-av{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.6rem;margin-bottom:10px;}
.kid-name{font-size:.9rem;font-weight:800;}
.kid-user{font-size:.62rem;color:var(--slate);margin-bottom:8px;}
.kid-bal{font-size:1.3rem;font-weight:900;color:var(--gold);display:flex;align-items:center;gap:4px;}
.kid-bal small{font-size:.6rem;color:rgba(255,255,255,.4);font-weight:400;}
.kid-add{background:rgba(0,196,182,.05);border:1.5px dashed rgba(0,196,182,.3);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:6px;min-height:130px;color:var(--teal);}
.kid-add:hover{background:rgba(0,196,182,.1);}
.kid-add-ic{font-size:1.8rem;}
.kid-add-t{font-size:.78rem;font-weight:800;}

.empty{text-align:center;padding:30px 16px;background:rgba(0,196,182,.05);border:1.5px dashed rgba(0,196,182,.22);border-radius:16px;}
.empty-ic{font-size:2.4rem;margin-bottom:8px;}
.empty-t{font-weight:800;margin-bottom:4px;}
.empty-s{font-size:.76rem;color:var(--slate);margin-bottom:14px;}

/* ── List rows (tx / tasks / approvals) ── */
.row{display:flex;align-items:center;gap:10px;padding:11px 13px;background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:7px;}
.row-av{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:.95rem;flex-shrink:0;background:rgba(0,196,182,.1);}
.row-main{flex:1;min-width:0;}
.row-t{font-size:.8rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.row-s{font-size:.63rem;color:var(--slate);}
.row-amt{font-size:.85rem;font-weight:900;flex-shrink:0;}
.pos{color:#4ADE80;} .neg{color:#FF8593;}
.row-actions{display:flex;gap:5px;flex-shrink:0;}

/* ── Modal ── */
.ov{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;padding:18px;
  background:rgba(6,12,20,.78);backdrop-filter:blur(6px);}
.ov.show{display:flex;animation:fade .2s ease;}
@keyframes fade{from{opacity:0}to{opacity:1}}
.modal{width:100%;max-width:400px;background:linear-gradient(160deg,var(--navy3),rgba(13,27,42,.98));
  border:1px solid rgba(0,196,182,.22);border-radius:22px;padding:24px 22px;max-height:90vh;overflow-y:auto;
  animation:pop .3s cubic-bezier(.36,.07,.19,.97);}
@keyframes pop{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.modal-head h3{font-size:1.1rem;font-weight:900;}
.x{width:30px;height:30px;border-radius:50%;border:none;background:rgba(255,255,255,.06);color:rgba(255,255,255,.6);cursor:pointer;font-size:.85rem;}
.x:hover{background:rgba(255,255,255,.12);color:#fff;}
.field{margin-bottom:13px;}
.field label{display:block;font-size:.73rem;font-weight:700;color:rgba(255,255,255,.6);margin-bottom:5px;}
.field input,.field select{width:100%;padding:11px 13px;border-radius:11px;border:1.5px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.04);color:#fff;font-family:'Cairo','Poppins',sans-serif;font-size:.88rem;outline:none;transition:all .2s;}
.field input:focus,.field select:focus{border-color:var(--teal);background:rgba(0,196,182,.06);}
.pick-row{display:flex;gap:6px;flex-wrap:wrap;}
.pick{width:40px;height:40px;border-radius:11px;border:2px solid transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.15rem;background:rgba(255,255,255,.05);transition:all .15s;}
.pick.sel{border-color:var(--teal);transform:scale(1.08);}
.color-pick{width:34px;height:34px;border-radius:50%;border:2.5px solid transparent;cursor:pointer;transition:all .15s;}
.color-pick.sel{border-color:#fff;transform:scale(1.12);}
.quick{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.quick button{flex:1;min-width:52px;padding:9px;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,.04);
  color:#fff;font-family:'Cairo',sans-serif;font-weight:800;font-size:.85rem;cursor:pointer;transition:all .18s;}
.quick button:hover{background:rgba(0,196,182,.12);border-color:rgba(0,196,182,.3);}
.modal-err{font-size:.75rem;color:var(--red);min-height:18px;font-weight:700;text-align:center;margin:4px 0;}
.modal-btns{display:flex;gap:8px;margin-top:6px;}
.modal-btns .btn{flex:1;justify-content:center;padding:12px;}

.seg{display:flex;gap:4px;background:rgba(255,255,255,.04);border-radius:12px;padding:4px;margin-bottom:14px;}
.seg button{flex:1;padding:9px;border:none;background:none;border-radius:9px;cursor:pointer;font-family:'Cairo','Poppins',sans-serif;
  font-weight:800;font-size:.8rem;color:rgba(255,255,255,.5);transition:all .18s;}
.seg button.on{background:linear-gradient(135deg,var(--teal),var(--teal2));color:var(--navy);}

/* ── Toast ── */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);z-index:400;
  background:var(--navy3);border:1px solid rgba(0,196,182,.4);border-radius:14px;padding:12px 20px;
  font-size:.85rem;font-weight:700;box-shadow:0 12px 40px rgba(0,0,0,.5);transition:transform .35s cubic-bezier(.2,.8,.2,1);max-width:90vw;}
.toast.show{transform:translateX(-50%) translateY(0);}

/* ── Child view ── */
.child-hero{background:linear-gradient(145deg,rgba(0,196,182,.14),rgba(245,197,24,.05));border:1px solid rgba(0,196,182,.25);
  border-radius:22px;padding:26px 20px;text-align:center;margin-bottom:20px;}
.child-hero .av{font-size:3rem;margin-bottom:8px;}
.child-hero .nm{font-size:1.1rem;font-weight:800;}
.child-hero .bal{font-size:2.4rem;font-weight:900;color:var(--gold);margin-top:8px;display:flex;align-items:center;justify-content:center;gap:8px;}
@media(max-width:520px){.wrap{padding:16px 12px 50px;}.kids{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));}}
</style>
</head>

function applyLang(l){lang=l;const o=T[l];

  document.body.style.fontFamily=l==='en'?"'Inter','Poppins',sans-serif":"'Cairo',sans-serif";

function el(id){return document.getElementById(id);}
function show(id){el(id).classList.remove('hide');}
function hide(id){el(id).classList.add('hide');}
function openM(id){el(id).classList.add('show');}
function closeM(id){el(id).classList.remove('show');}
let toastT;
function toast(msg){const x=el('toast');x.textContent=msg;x.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>x.classList.remove('show'),2600);}
function fmt(n){return new Intl.NumberFormat(lang==='ar'?'ar-EG':'en-US').format(n);}
function esc(s){return String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

(async function boot(){
  applyLang(lang);
  if(!window.KC||!window.KIDCOINS_CONFIG||String(window.KIDCOINS_CONFIG.SUPABASE_URL).includes('YOUR-PROJECT')){
    el('loading').innerHTML='<div style="text-align:center;max-width:340px"><div style="font-size:2.4rem;margin-bottom:10px">⚙️</div>'+
      '<div style="font-weight:800;margin-bottom:6px">Supabase غير مُهيّأ</div>'+
      '<div style="font-size:.8rem;color:#64748B">افتح <b>js/config.js</b> وأضف رابط ومفتاح مشروعك، ثم شغّل <b>supabase/schema.sql</b>.</div></div>';
    return;
  }
  // Child session?
  const childSess=KC.getChildSession();
  const isChildRoute=(location.hash==='#child');
  if(childSess && (isChildRoute || !(await KC.getSession()))){
    return bootChild(childSess);
  }
  // Parent session?
  const session=await KC.getSession();
  if(!session){ location.replace('auth.html'); return; }
  await bootParent();
})();

async function bootParent(){
  try{
    const fams=await KC.myFamilies();
    if(!fams.length){ toast('لا توجد عائلة'); return; }
    state.family=fams[0];
    await refreshParent();
    hide('loading'); show('parent-view');
    // realtime
    KC.subscribeFamily(state.family.id, ()=>refreshParent());
  }catch(e){ console.error(e); el('loading').innerHTML='<div style="color:#FF8593">خطأ: '+esc(e.message)+'</div>'; }
}
async function refreshParent(){
  const fid=state.family.id;
  const [kids,tx,pending,store,purch]=await Promise.all([
    KC.listChildren(fid),
    KC.listTransactions(fid,{limit:20}),
    KC.listTransactions(fid,{limit:50}),
    KC.listStore(fid),
    KC.listPurchases(fid,'pending')
  ]);
  state.children=kids;
  state.tx=tx.filter(x=>x.status==='approved');
  state.pending=pending.filter(x=>x.status==='pending');
  state.store=store||[];
  state.purchases=purch||[];
  renderParent();
}
function renderParent(){
  const f=state.family;
  el('fam-name').textContent=f.name;

  el('kids-count').textContent=fmt(state.children.length);

  // approvals = pending transactions + pending purchase requests
  const purch=state.purchases||[];
  const totalPending=state.pending.length+purch.length;
  if(totalPending){
    show('approvals-sec');
    el('appr-count').textContent=fmt(totalPending);
    const txRows=state.pending.map(p=>{
      const kid=state.children.find(k=>k.id===p.child_id);
      return `<div class="row">
        <div class="row-av">${TX_ICON[p.type]||'⏳'}</div>
        <div class="row-main"><div class="row-t">${esc(p.description||TX_LABEL[p.type]||p.type)}</div>
          <div class="row-s">${kid?esc(kid.name):''}</div></div>
        <div class="row-amt ${p.amount>=0?'pos':'neg'}">${p.amount>=0?'+':''}${fmt(p.amount)}</div>
        <div class="row-actions">
          <button class="btn btn-sm btn-green" onclick="decide('${p.id}',true)">✓</button>
          <button class="btn btn-sm btn-red" onclick="decide('${p.id}',false)">✕</button>
        </div></div>`;
    }).join('');
    const purchRows=purch.map(p=>{
      const kid=state.children.find(k=>k.id===p.child_id);
      return `<div class="row">
        <div class="row-av">🛍️</div>
        <div class="row-main"><div class="row-t">${esc(p.title)}</div>
          <div class="row-s">${kid?esc(kid.name):''} · ${lang==='ar'?'طلب شراء':'purchase'}</div></div>
        <div class="row-amt neg">-${fmt(p.cost)}</div>
        <div class="row-actions">
          <button class="btn btn-sm btn-green" onclick="decidePurchase('${p.id}',true)">✓</button>
          <button class="btn btn-sm btn-red" onclick="decidePurchase('${p.id}',false)">✕</button>
        </div></div>`;
    }).join('');
    el('approvals-list').innerHTML=purchRows+txRows;
  } else hide('approvals-sec');

  // store
  const sw=el('store-wrap'); const store=state.store||[];
  el('store-count').textContent=fmt(store.length);
  sw.innerHTML=store.length ? store.map(s=>`
      <div class="row">
        <div class="row-av">${s.icon||'🎁'}</div>
        <div class="row-main"><div class="row-t">${esc(s.title)}</div></div>
        <div class="row-amt" style="color:var(--gold)">${fmt(s.cost)} 🪙</div>
        <div class="row-actions"><button class="btn btn-sm btn-red" onclick="removeItem('${s.id}')">🗑️</button></div>
      </div>`).join('')
    : `<div class="row" style="justify-content:center;color:#64748B">${lang==='ar'?'لا توجد منتجات — أضف أول منتج':'No items yet'}</div>`;

  // children
  const wrap=el('kids-wrap');
  if(!state.children.length){
    wrap.innerHTML=`<div class="empty"><div class="empty-ic">👶</div>
      <div class="empty-t">${t('noKids')}</div><div class="empty-s">${t('noKidsSub')}</div>
      <button class="btn btn-primary" onclick="openAddChild()">${t('addNow')}</button></div>`;
  } else {
    wrap.innerHTML='<div class="kids">'+state.children.map(k=>`
      <div class="kid" onclick="openKid('${k.id}')">
        <div class="kid-av" style="background:${k.color}22;color:${k.color}">${k.avatar}</div>
        <div class="kid-name">${esc(k.name)}</div>
        <div class="kid-user">@${esc(k.username)}</div>
        <div class="kid-bal">${fmt(k.balance)} <small>${t('coin')}</small></div>
      </div>`).join('')+
      `<div class="kid kid-add" onclick="openAddChild()">
        <div class="kid-add-ic">➕</div><div class="kid-add-t">${t('addKid')}</div></div></div>`;
  }

  // recent tx
  const list=el('tx-list');
  if(!state.tx.length){ list.innerHTML=`<div class="row" style="justify-content:center;color:#64748B">—</div>`; }
  else list.innerHTML=state.tx.slice(0,12).map(x=>{
    const kid=state.children.find(k=>k.id===x.child_id);
    const d=new Date(x.created_at).toLocaleDateString(lang==='ar'?'ar-EG':'en-US',{month:'short',day:'numeric'});
    return `<div class="row"><div class="row-av">${TX_ICON[x.type]||'💠'}</div>
      <div class="row-main"><div class="row-t">${esc(x.description||TX_LABEL[x.type]||x.type)}</div>
        <div class="row-s">${kid?esc(kid.name):''} · ${d}</div></div>
      <div class="row-amt ${x.amount>=0?'pos':'neg'}">${x.amount>=0?'+':''}${fmt(x.amount)}</div></div>`;
  }).join('');
}

async function decide(txId,ok){
  try{ await KC.decideTransaction(txId,ok); toast(t('done')); await refreshParent(); }
  catch(e){ toast('⚠️ '+e.message); }
}

// ── Store: approve/reject a purchase request ──
async function decidePurchase(pid,ok){
  const p=(state.purchases||[]).find(x=>x.id===pid); if(!p)return;
  try{ await KC.decidePurchase(p,ok); toast(t('done')); await refreshParent(); }
  catch(e){ toast('⚠️ '+e.message); }
}
// ── Store: add/remove items ──
const ITEM_ICONS=['🎁','🎮','📱','🍫','🎡','📖','🍔','🚲','⚽','🎨','🧸','🎧'];
let it_icon=ITEM_ICONS[0];

async function saveItem(){

// ── Add child modal ──
function openAddChild(){
  el('ac-name').value='';el('ac-user').value='';el('ac-pin').value='';el('ac-err').textContent='';
  ac_icon=ICONS[0];ac_color=COLORS[0];
  el('ac-icons').innerHTML=ICONS.map((ic,i)=>`<div class="pick ${i===0?'sel':''}" data-ic="${ic}" onclick="pickIcon(this)">${ic}</div>`).join('');
  el('ac-colors').innerHTML=COLORS.map((c,i)=>`<div class="color-pick ${i===0?'sel':''}" data-c="${c}" style="background:${c}" onclick="pickColor(this)"></div>`).join('');
  openM('m-child');setTimeout(()=>el('ac-name').focus(),150);
}
function pickIcon(e){document.querySelectorAll('#ac-icons .pick').forEach(x=>x.classList.remove('sel'));e.classList.add('sel');ac_icon=e.dataset.ic;}
function pickColor(e){document.querySelectorAll('#ac-colors .color-pick').forEach(x=>x.classList.remove('sel'));e.classList.add('sel');ac_color=e.dataset.c;}
async function saveChild(){
  const name=el('ac-name').value.trim(),user=el('ac-user').value.trim().toLowerCase(),pin=el('ac-pin').value.trim();
  const err=el('ac-err');
  if(!name){err.textContent=lang==='ar'?'أدخل الاسم':'Enter name';return;}
  if(!user){err.textContent=lang==='ar'?'أدخل اسم المستخدم':'Enter username';return;}
  if(!/^\d{4}$/.test(pin)){err.textContent=lang==='ar'?'الرمز 4 أرقام':'PIN must be 4 digits';return;}
  const btn=el('ac-save');btn.disabled=true;
  try{
    await KC.createChild({familyId:state.family.id,name,username:user,pin,avatar:ac_icon,color:ac_color});
    closeM('m-child');toast(t('added'));await refreshParent();
  }catch(e){ err.textContent=/duplicate|unique/i.test(e.message)?(lang==='ar'?'اسم المستخدم مستخدم':'Username taken'):e.message; }

}

// ── Kid actions modal ──
function openKid(id){
  mk_kid=state.children.find(k=>k.id===id);if(!mk_kid)return;
  el('mk-title').textContent=mk_kid.avatar+' '+mk_kid.name;
  mkTab('give');el('mk-amt').value='';el('mk-desc').value='';el('mk-ttl').value='';el('mk-trew').value='';el('mk-err').textContent='';
  el('mk-gttl').value='';el('mk-gtar').value='';
  mk_gicon=GOAL_ICONS[0];
  el('mk-gicons').innerHTML=GOAL_ICONS.map((ic,i)=>`<div class="pick ${i===0?'sel':''}" data-ic="${ic}" onclick="pickGoalIcon(this)">${ic}</div>`).join('');
  el('mk-quick').innerHTML=[10,25,50,100].map(v=>`<button onclick="el('mk-amt').value=${v}">${v}</button>`).join('');
  openM('m-kid');
}
const GOAL_ICONS=['🎯','🚲','🎮','📱','🎨','⚽','🧸','📚','🎧','🛹','🏀','🎁'];
let mk_gicon=GOAL_ICONS[0];
function pickGoalIcon(e){document.querySelectorAll('#mk-gicons .pick').forEach(x=>x.classList.remove('sel'));e.classList.add('sel');mk_gicon=e.dataset.ic;}
function mkTab(tab){
  mk_tab=tab;
  ['give','take','task','goal'].forEach(x=>el('seg-'+x).classList.toggle('on',x===tab));
  el('mk-money').classList.toggle('hide',tab==='task'||tab==='goal');
  el('mk-task').classList.toggle('hide',tab!=='task');
  el('mk-goal').classList.toggle('hide',tab!=='goal');
}
async function saveKidAction(){
  const err=el('mk-err');const btn=el('mk-save');
  try{
    btn.disabled=true;
    if(mk_tab==='task'){
      const ttl=el('mk-ttl').value.trim();const rew=parseInt(el('mk-trew').value)||0;
      if(!ttl){err.textContent=lang==='ar'?'أدخل عنوان المهمة':'Enter task title';btn.disabled=false;return;}
      await KC.createTask({family_id:state.family.id,child_id:mk_kid.id,title:ttl,reward:rew,status:'assigned'});
      toast(lang==='ar'?'✅ أُضيفت المهمة':'✅ Task added');
    }else if(mk_tab==='goal'){
      const ttl=el('mk-gttl').value.trim();const tar=parseInt(el('mk-gtar').value)||0;
      if(!ttl){err.textContent=lang==='ar'?'أدخل اسم الهدف':'Enter goal name';btn.disabled=false;return;}
      if(tar<=0){err.textContent=lang==='ar'?'أدخل مبلغاً مستهدفاً':'Enter a target';btn.disabled=false;return;}
      await KC.createGoal({family_id:state.family.id,child_id:mk_kid.id,title:ttl,icon:mk_gicon,target_amount:tar,current_amount:0});
      toast(lang==='ar'?'🎯 أُضيف الهدف':'🎯 Goal added');
    }else{
      let amt=parseInt(el('mk-amt').value)||0;
      if(amt<=0){err.textContent=lang==='ar'?'أدخل مبلغاً':'Enter an amount';btn.disabled=false;return;}
      if(mk_tab==='take')amt=-amt;
      await KC.addTransaction({familyId:state.family.id,childId:mk_kid.id,
        type:mk_tab==='give'?'gift':'penalty',amount:amt,description:el('mk-desc').value.trim()||(mk_tab==='give'?'مكافأة':'خصم'),status:'approved'});
      toast(t('done'));
    }
    closeM('m-kid');await refreshParent();
  }catch(e){ err.textContent=e.message; }
  finally{ btn.disabled=false; }
}

// ══════════════════════════════════════════════════════
//  CHILD VIEW
// ══════════════════════════════════════════════════════
async function bootChild(sess){
  state.child=sess;
  await refreshChild();
  renderChild();
  hide('loading');show('child-view');
}
async function refreshChild(){
  const c=state.child; if(!c)return;
  try{
    const [fresh,tasks,tx,store,goals]=await Promise.all([
      KC.childRefresh(c.child_id),
      KC.childTasks(c.child_id),
      KC.childTransactions(c.child_id,15),
      KC.childStore(c.family_id),
      KC.childGoals(c.child_id)
    ]);
    if(fresh){ c.balance=fresh.balance; c.level=fresh.level; }
    state._ctasks=tasks||[]; state._ctx=tx||[];
    state._cstore=store||[]; state._cgoals=goals||[];
  }catch(e){console.warn(e);}
}
let childCurTab='home';
function childTab(tab){
  childCurTab=tab;
  ['home','store','goals'].forEach(x=>{
    el('cseg-'+x).classList.toggle('on',x===tab);
    el('cpane-'+x).classList.toggle('hide',x!==tab);
  });
}
function renderChild(){
  const c=state.child;if(!c)return;
  el('cv-av').textContent=c.avatar||'🧒';
  el('cv-name').textContent=c.name;
  el('cv-bal').innerHTML=fmt(c.balance)+' 🪙';

  // tasks
  const tw=el('cv-tasks');const tasks=(state._ctasks||[]).filter(x=>x.status!=='approved');
  tw.innerHTML=tasks.length?tasks.map(x=>`<div class="row"><div class="row-av">${x.icon||'📋'}</div>
    <div class="row-main"><div class="row-t">${esc(x.title)}</div><div class="row-s">${lang==='ar'?'مكافأة':'reward'}</div></div>
    <div class="row-amt pos">+${fmt(x.reward)}</div></div>`).join('')
    :`<div class="row" style="justify-content:center;color:#64748B">—</div>`;

  // activity
  const xw=el('cv-tx');
  xw.innerHTML=(state._ctx||[]).length?state._ctx.map(x=>{
    const d=new Date(x.created_at).toLocaleDateString(lang==='ar'?'ar-EG':'en-US',{month:'short',day:'numeric'});
    return `<div class="row"><div class="row-av">${TX_ICON[x.type]||'💠'}</div>
      <div class="row-main"><div class="row-t">${esc(x.description||x.type)}</div><div class="row-s">${d}</div></div>
      <div class="row-amt ${x.amount>=0?'pos':'neg'}">${x.amount>=0?'+':''}${fmt(x.amount)}</div></div>`;
  }).join(''):`<div class="row" style="justify-content:center;color:#64748B">—</div>`;

  // store (child can afford → highlighted; else disabled)
  const sw=el('cv-store');const store=state._cstore||[];
  sw.innerHTML=store.length?store.map(s=>{
    const can=c.balance>=s.cost;
    return `<div class="row">
      <div class="row-av">${s.icon||'🎁'}</div>
      <div class="row-main"><div class="row-t">${esc(s.title)}</div>
        <div class="row-s">${can?(lang==='ar'?'يمكنك طلبه':'you can request'):(lang==='ar'?'رصيد غير كافٍ':'not enough')}</div></div>
      <div class="row-amt" style="color:var(--gold)">${fmt(s.cost)} 🪙</div>
      <div class="row-actions">
        <button class="btn btn-sm ${can?'btn-green':'btn-ghost'}" ${can?'':'disabled'} onclick="reqPurchase('${s.id}','${esc(s.title)}')">🛒</button>
      </div></div>`;
  }).join(''):`<div class="row" style="justify-content:center;color:#64748B">${lang==='ar'?'المتجر فارغ':'store is empty'}</div>`;

  // goals with progress bars
  const gw=el('cv-goals');const goals=state._cgoals||[];
  gw.innerHTML=goals.length?goals.map(g=>{
    const pct=Math.min(100,Math.round(g.current_amount/g.target_amount*100));
    const done=g.status==='completed'||pct>=100;
    return `<div class="row" style="flex-direction:column;align-items:stretch;gap:8px">
      <div style="display:flex;align-items:center;gap:10px">
        <div class="row-av">${g.icon||'🎯'}</div>
        <div class="row-main"><div class="row-t">${esc(g.title)} ${done?'✅':''}</div>
          <div class="row-s">${fmt(g.current_amount)} / ${fmt(g.target_amount)} 🪙 · ${pct}%</div></div>
        ${done?'':`<button class="btn btn-sm btn-primary" onclick="openDeposit('${g.id}','${esc(g.title)}',${g.target_amount-g.current_amount})">➕ ${lang==='ar'?'ادّخر':'save'}</button>`}
      </div>
      <div style="height:8px;border-radius:99px;background:rgba(255,255,255,.08);overflow:hidden">
        <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,var(--teal),var(--gold));border-radius:99px"></div>
      </div></div>`;
  }).join(''):`<div class="row" style="justify-content:center;color:#64748B">${lang==='ar'?'لا أهداف بعد':'no goals yet'}</div>`;
}

    await KC.childRequestPurchase(c.family_id,c.child_id,itemId);
    toast(lang==='ar'?'✅ أُرسل طلبك لوالدك':'✅ Sent to your parent');

}
// child deposits into a goal (simple prompt-based amount)
function openDeposit(goalId,title,remaining){
  const c=state.child;if(!c)return;
  const max=Math.min(c.balance,remaining);
  const amtStr=prompt((lang==='ar'?'كم تريد أن تدّخر لـ ':'How much to save for ')+title+'؟ (1-'+max+')');
  if(amtStr==null)return;
  const amt=parseInt(amtStr)||0;
  if(amt<=0||amt>max){ toast(lang==='ar'?'مبلغ غير صحيح':'invalid amount'); return; }
  doDeposit(goalId,amt);
}
async function doDeposit(goalId,amt){
  try{
    await KC.depositGoal(goalId,amt);
    toast(lang==='ar'?'🎯 تم الادخار!':'🎯 Saved!');
    await refreshChild(); renderChild();
  }catch(e){ toast('⚠️ '+e.message); }
}

// ══════════════════════════════════════════════════════
//  Common
// ══════════════════════════════════════════════════════
function copyCode(){
  const code=state.family?state.family.family_code:'';
  if(navigator.clipboard&&code){navigator.clipboard.writeText(code).then(()=>toast(t('copied')));}
}
async function doLogout(){
  try{ KC.childLogout(); await KC.signOut(); }catch(_){}
  location.replace('auth.html');
}
