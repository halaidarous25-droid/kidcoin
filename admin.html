<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5">
<title>KidCoins — لوحة المالك</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--teal:#00C4B6;--teal2:#00A89C;--navy:#0D1B2A;--navy2:#0A1520;--navy3:#111F30;
  --gold:#F5C518;--red:#FF5C6C;--green:#22C55E;--purple:#9B59B6;--blue:#3498DB;
  --slate:#64748B;--border:rgba(255,255,255,.08);--card:rgba(255,255,255,.04);}
html{font-size:16px;}
body{font-family:'Cairo',sans-serif;background:
  radial-gradient(ellipse 70% 50% at 20% 0%,rgba(0,196,182,.1),transparent),
  radial-gradient(ellipse 60% 50% at 90% 100%,rgba(155,89,182,.08),transparent),var(--navy);
  color:#fff;min-height:100vh;line-height:1.6;-webkit-font-smoothing:antialiased;}
[lang="en"] body{font-family:'Inter','Poppins',sans-serif;}
.hide{display:none!important;}

.topbar{position:sticky;top:0;z-index:50;height:60px;padding:0 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;
  background:rgba(13,27,42,.96);backdrop-filter:blur(18px);border-bottom:1px solid rgba(0,196,182,.16);}
.tb-brand{display:flex;align-items:center;gap:9px;}
.tb-logo{height:38px;width:auto;object-fit:contain;filter:drop-shadow(0 3px 8px rgba(0,196,182,.3));}
.tb-title{font-size:.92rem;font-weight:900;}
.tb-title span{color:var(--gold);}
.tb-badge{font-size:.58rem;background:rgba(155,89,182,.2);color:#C589D8;border:1px solid rgba(155,89,182,.4);
  border-radius:99px;padding:2px 8px;font-weight:800;margin-inline-start:6px;}
.icon-btn{width:36px;height:36px;border-radius:99px;border:1.5px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);
  color:rgba(255,255,255,.7);cursor:pointer;font-size:.85rem;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.icon-btn:hover{background:rgba(255,255,255,.1);color:#fff;}

.wrap{max-width:1040px;margin:0 auto;padding:22px 16px 60px;}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:14px;color:rgba(255,255,255,.5);}
.spinner{width:38px;height:38px;border:3px solid rgba(0,196,182,.2);border-top-color:var(--teal);border-radius:50%;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}

/* gate (not authorised) */
.gate{max-width:420px;margin:8vh auto;text-align:center;background:var(--navy3);border:1px solid rgba(255,92,108,.25);
  border-radius:22px;padding:34px 26px;}
.gate .ic{font-size:2.6rem;margin-bottom:10px;}
.gate h2{font-size:1.15rem;font-weight:900;margin-bottom:8px;}
.gate p{font-size:.82rem;color:var(--slate);margin-bottom:18px;}
.gate a{display:inline-block;padding:11px 20px;border-radius:12px;background:linear-gradient(135deg,var(--teal),var(--teal2));
  color:var(--navy);font-weight:800;text-decoration:none;font-size:.85rem;}

h1.page{font-size:1.3rem;font-weight:900;margin-bottom:4px;}
.page-sub{font-size:.78rem;color:var(--slate);margin-bottom:20px;}

/* stat cards */
.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:26px;}
.stat{background:linear-gradient(145deg,var(--navy3),rgba(13,27,42,.6));border:1px solid var(--border);
  border-radius:16px;padding:16px 16px;position:relative;overflow:hidden;}
.stat::before{content:'';position:absolute;top:-30px;inset-inline-end:-30px;width:90px;height:90px;
  background:radial-gradient(circle,var(--gl,rgba(0,196,182,.14)),transparent 70%);border-radius:50%;}
.stat .ic{font-size:1.3rem;margin-bottom:8px;}
.stat .val{font-size:1.7rem;font-weight:900;line-height:1;}
.stat .lbl{font-size:.68rem;color:var(--slate);margin-top:4px;font-weight:600;}

.sec-head{display:flex;justify-content:space-between;align-items:center;margin:24px 0 12px;}
.sec-head h2{font-size:1rem;font-weight:800;display:flex;align-items:center;gap:7px;}
.count{font-size:.62rem;background:rgba(0,196,182,.14);color:var(--teal);border-radius:99px;padding:2px 9px;font-weight:800;}

/* family cards */
.fams{display:flex;flex-direction:column;gap:12px;}
.fam{background:var(--navy3);border:1px solid var(--border);border-radius:16px;overflow:hidden;transition:border-color .2s;}
.fam:hover{border-color:rgba(0,196,182,.28);}
.fam-top{display:flex;align-items:center;gap:12px;padding:15px 16px;cursor:pointer;}
.fam-ava{width:44px;height:44px;border-radius:13px;background:linear-gradient(135deg,rgba(0,196,182,.2),rgba(155,89,182,.15));
  display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;}
.fam-info{flex:1;min-width:0;}
.fam-name{font-size:.92rem;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fam-meta{font-size:.66rem;color:var(--slate);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fam-code{font-family:'Poppins',monospace;letter-spacing:1px;color:var(--gold);font-size:.72rem;font-weight:700;}
.fam-stats{display:flex;gap:14px;flex-shrink:0;text-align:center;}
.fam-stat .n{font-size:1rem;font-weight:900;}
.fam-stat .t{font-size:.56rem;color:var(--slate);}
.fam-chev{font-size:.7rem;color:var(--slate);transition:transform .25s;flex-shrink:0;}
.fam.open .fam-chev{transform:rotate(180deg);}
.fam-kids{max-height:0;overflow:hidden;transition:max-height .3s ease;background:rgba(0,0,0,.15);}
.fam.open .fam-kids{max-height:600px;}
.kid-row{display:flex;align-items:center;gap:10px;padding:10px 16px;border-top:1px solid rgba(255,255,255,.05);}
.kid-av{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;}
.kid-nm{flex:1;font-size:.8rem;font-weight:700;}
.kid-un{font-size:.62rem;color:var(--slate);}
.kid-bal{font-size:.85rem;font-weight:900;color:var(--gold);}
.kid-empty{padding:12px 16px;font-size:.72rem;color:var(--slate);text-align:center;border-top:1px solid rgba(255,255,255,.05);}

.refresh{margin-inline-start:auto;}
@media(max-width:560px){.fam-stats{gap:9px}.fam-code{display:none}}
</style>
</head>

<script>
function el(id){return document.getElementById(id);}
function fmt(n){return new Intl.NumberFormat('ar-EG').format(n||0);}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

async function doLogout(){ try{ await KC.signOut(); }catch(_){ } location.replace('auth.html'); }

async function boot(){
  if(!window.KC||!window.KIDCOINS_CONFIG||String(window.KIDCOINS_CONFIG.SUPABASE_URL).includes('YOUR-PROJECT')){
    el('loading').innerHTML='<div style="color:#FF8593">Supabase غير مُهيّأ</div>'; return;
  }
  const session = await KC.getSession();
  if(!session){ location.replace('auth.html'); return; }
  // Check admin via RPC; if not admin, the RPC throws → show gate
  try{
    await loadAll();
    el('loading').classList.add('hide');
    el('admin').classList.remove('hide');
  }catch(e){
    el('loading').classList.add('hide');
    el('gate').classList.remove('hide');
  }
}

async function loadAll(){
  const [{data:stats,error:e1},{data:fams,error:e2}] = await Promise.all([
    KC.client.rpc('admin_stats'),
    KC.client.rpc('admin_families')
  ]);
  if(e1) throw e1; if(e2) throw e2;
  renderStats(stats); renderFams(fams||[]);
}

function renderStats(s){
  s=s||{};
  const cards=[
    {ic:'👨‍👩‍👧‍👦',val:s.families,lbl:'عائلة',gl:'rgba(0,196,182,.16)'},

    {ic:'🧒',val:s.children,lbl:'طفل',gl:'rgba(245,197,24,.16)'},
    {ic:'🪙',val:s.total_balance,lbl:'إجمالي الأرصدة',gl:'rgba(245,197,24,.16)'},
    {ic:'💠',val:s.transactions,lbl:'عملية',gl:'rgba(155,89,182,.16)'},
    {ic:'⏳',val:s.pending,lbl:'طلب معلّق',gl:'rgba(255,92,108,.16)'},
    {ic:'📋',val:s.tasks,lbl:'مهمة',gl:'rgba(34,197,94,.16)'},
    {ic:'🎯',val:s.goals,lbl:'هدف ادخاري',gl:'rgba(0,196,182,.16)'}
  ];
  el('stats').innerHTML=cards.map(c=>`
    <div class="stat" style="--gl:${c.gl}">
      <div class="ic">${c.ic}</div>
      <div class="val">${fmt(c.val)}</div>
      <div class="lbl">${c.lbl}</div>
    </div>`).join('');
}

function renderFams(fams){
  el('fam-count').textContent=fmt(fams.length);
  if(!fams.length){ el('fams').innerHTML='<div class="kid-empty">لا توجد عائلات بعد</div>'; return; }
  el('fams').innerHTML=fams.map((f,i)=>{
    const kids=(f.children||[]);
    const kidsHtml = kids.length
      ? kids.map(k=>`<div class="kid-row">
          <div class="kid-av" style="background:rgba(0,196,182,.12)">${k.avatar||'🧒'}</div>
          <div class="kid-nm">${esc(k.name)} <span class="kid-un">@${esc(k.username)} · م${k.level||1}</span></div>
          <div class="kid-bal">${fmt(k.balance)} 🪙</div>
        </div>`).join('')
      : '<div class="kid-empty">لا يوجد أطفال في هذه العائلة</div>';
    return `<div class="fam" id="fam-${i}">
      <div class="fam-top" onclick="document.getElementById('fam-${i}').classList.toggle('open')">
        <div class="fam-ava">🏠</div>
        <div class="fam-info">
          <div class="fam-name">${esc(f.name)}</div>
          <div class="fam-meta">${esc(f.owner_email||'—')} · <span class="fam-code">${esc(f.family_code)}</span></div>
        </div>
        <div class="fam-stats">
          <div class="fam-stat"><div class="n">${fmt(f.children_count)}</div><div class="t">أطفال</div></div>
          <div class="fam-stat"><div class="n">${fmt(f.total_balance)}</div><div class="t">رصيد</div></div>
        </div>
        <div class="fam-chev">▼</div>
      </div>
      <div class="fam-kids">${kidsHtml}</div>
    </div>`;
  }).join('');
}

boot();
</script>
</body>
</html>
