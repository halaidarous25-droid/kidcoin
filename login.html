<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5">
<meta name="theme-color" content="#0D1B2A">
<title>KidCoins — تسجيل الدخول</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --teal:#00C4B6;--teal2:#00A89C;--navy:#0D1B2A;--navy2:#0A1520;--navy3:#111F30;
  --gold:#F5C518;--gold2:#E0A800;--slate:#64748B;--red:#FF3355;--green:#22C55E;
  --border:rgba(255,255,255,.07);--card:rgba(255,255,255,.04);--text:#fff
}
body{font-family:'Cairo',sans-serif;background:var(--navy);color:#fff;min-height:100vh;
  line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden;
  display:flex;flex-direction:column;position:relative}
/* subtle brand glows, in the landing's palette */
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 60% 40% at 15% 0%,rgba(0,196,182,.10),transparent),
             radial-gradient(ellipse 50% 40% at 90% 100%,rgba(245,197,24,.07),transparent)}
.bgcoin{position:fixed;font-size:1.8rem;opacity:.05;pointer-events:none;user-select:none;z-index:0;
  animation:float 7s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-16px) rotate(10deg)}}

/* top bar — mirrors the landing nav */
.topbar{position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;background:rgba(13,27,42,.85);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border)}
.brand{display:flex;align-items:center;gap:10px}
.brand .icon{font-size:1.7rem;filter:drop-shadow(0 3px 8px rgba(0,196,182,.3))}
.brand .name{font-weight:900;font-size:1.05rem;letter-spacing:-.3px}
.brand .name span{color:var(--gold)}
.brand .lego{font-family:'Poppins',sans-serif;font-size:.5rem;color:var(--teal);letter-spacing:2.5px;
  font-weight:700;direction:ltr;text-align:left;margin-top:1px}
.back{display:flex;align-items:center;gap:6px;padding:9px 18px;border-radius:99px;border:1px solid var(--border);
  background:var(--card);color:#cbd5e1;font-family:inherit;font-weight:800;font-size:.8rem;cursor:pointer;
  text-decoration:none;transition:all .2s}
.back:hover{border-color:var(--teal);color:#fff}

.wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:30px 20px;position:relative;z-index:1}
.hero{text-align:center;margin-bottom:22px}
.hero .big{font-size:2.6rem;margin-bottom:8px;filter:drop-shadow(0 6px 18px rgba(0,196,182,.35))}
.hero h1{font-size:1.5rem;font-weight:900;letter-spacing:-.5px}
.hero h1 span{color:var(--gold)}
.hero p{font-size:.85rem;color:var(--slate);margin-top:6px;font-weight:600}

.card{width:100%;max-width:400px;background:var(--navy3);border:1px solid var(--border);
  border-radius:22px;padding:26px 22px;box-shadow:0 24px 60px rgba(0,0,0,.4)}
.tabs{display:flex;background:var(--navy2);border-radius:99px;padding:5px;margin-bottom:16px;gap:4px}
.tab{flex:1;padding:11px;border:none;background:transparent;color:var(--slate);font-family:inherit;
  font-weight:900;font-size:.88rem;border-radius:99px;cursor:pointer;transition:.2s}
.tab.on{background:linear-gradient(135deg,var(--teal),var(--teal2));color:var(--navy);
  box-shadow:0 4px 18px rgba(0,196,182,.35)}
.tagline{text-align:center;font-size:.82rem;color:var(--slate);margin-bottom:16px;min-height:1.2em;font-weight:600}
label{display:block;font-size:.76rem;font-weight:700;color:var(--slate);margin:14px 0 6px}
input{width:100%;padding:13px 15px;background:var(--navy2);border:1px solid var(--border);
  border-radius:12px;color:#fff;font-family:inherit;font-size:.95rem;transition:.2s}
input.ltr{direction:ltr;text-align:left}
input::placeholder{color:#3f4d63}
input:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px rgba(0,196,182,.13)}
.btn{width:100%;padding:15px;margin-top:22px;border:none;border-radius:99px;
  font-family:'Cairo','Poppins',sans-serif;font-weight:900;font-size:1.02rem;cursor:pointer;transition:.2s;
  background:linear-gradient(135deg,var(--teal),var(--teal2));color:var(--navy);
  box-shadow:0 6px 22px rgba(0,196,182,.32)}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.6;cursor:not-allowed}
.msg{margin-top:15px;padding:12px;border-radius:12px;font-size:.82rem;font-weight:600;text-align:center;display:none}
.msg.err{display:block;background:rgba(255,51,85,.12);color:#ff8095;border:1px solid rgba(255,51,85,.3)}
.msg.ok{display:block;background:rgba(34,197,94,.12);color:#5ee9a0;border:1px solid rgba(34,197,94,.3)}
.hint{text-align:center;font-size:.74rem;color:var(--slate);margin-top:16px;line-height:1.7}
.link{color:var(--teal);cursor:pointer;font-weight:700}
.spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(13,27,42,.3);
  border-top-color:var(--navy);border-radius:50%;animation:s .7s linear infinite;vertical-align:middle}
@keyframes s{to{transform:rotate(360deg)}}
.foot{text-align:center;font-size:.68rem;color:var(--slate);padding:16px;position:relative;z-index:1}
</style>
</head>
<body>
<span class="bgcoin" style="top:16%;left:8%">🪙</span>
<span class="bgcoin" style="top:26%;right:9%;animation-delay:1.5s">⭐</span>
<span class="bgcoin" style="bottom:18%;left:13%;animation-delay:3s">💰</span>
<span class="bgcoin" style="bottom:28%;right:11%;animation-delay:2s">🪙</span>

<div class="topbar">
  <div class="brand">
    <span class="icon">🏦</span>
    <div>
      <div class="name">Kid<span>Coins</span></div>
      <div class="lego">LEARN · EARN · GROW</div>
    </div>
  </div>
  <a class="back" href="index.html">→ العودة للموقع</a>
</div>

<div class="wrap">
  <div class="hero">
    <div class="big">🏦</div>
    <h1>بنك <span>العائلة</span></h1>
    <p>حساب عائلتك — آمن ومعزول</p>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab on" id="tab-login" onclick="mode('login')">تسجيل الدخول</button>
      <button class="tab" id="tab-signup" onclick="mode('signup')">تجربة مجانية</button>
    </div>
    <div class="tagline" id="tagline">أهلاً بعودتك — سجّل دخول عائلتك</div>

    <div id="signup-name-wrap" style="display:none">
      <label>اسم العائلة</label>
      <input id="famname" type="text" placeholder="عائلة العيدروس">
    </div>
    <label>البريد الإلكتروني</label>
    <input id="email" class="ltr" type="email" placeholder="you@example.com" autocomplete="email">
    <label>كلمة المرور</label>
    <input id="pass" class="ltr" type="password" placeholder="••••••••" autocomplete="current-password">

    <button class="btn" id="go" onclick="submit()">دخول</button>
    <div class="msg" id="msg"></div>
    <div class="hint" id="hint">نسيت كلمة المرور؟ <span class="link" onclick="reset()">إعادة تعيين</span></div>
  </div>
</div>

<div class="foot">© 2026 KidCoins · بنك العائلة الذكي</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
var URL_='https://ecuqkmvhrkulebmwmwan.supabase.co';
var KEY_='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVjdXFrbXZocmt1bGVibXdtd2FuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ1NzcwNTUsImV4cCI6MjEwMDE1MzA1NX0.0gdBC9JVCa_sQXpH4A4J4Ym2VrjtooZWWCR43ZZF4tg';
var APP='kidcoin-user.html';
var sb=window.supabase.createClient(URL_,KEY_,{auth:{persistSession:true,autoRefreshToken:true}});
var M='login';
function el(id){return document.getElementById(id);}
function mode(m){
  M=m;
  el('tab-login').classList.toggle('on',m==='login');
  el('tab-signup').classList.toggle('on',m==='signup');
  el('signup-name-wrap').style.display=m==='signup'?'block':'none';
  el('go').textContent=m==='signup'?'إنشاء الحساب':'دخول';
  el('pass').setAttribute('autocomplete',m==='signup'?'new-password':'current-password');
  el('tagline').textContent=m==='signup'?'ابدأ مجاناً — أنشئ حساب عائلتك':'أهلاً بعودتك — سجّل دخول عائلتك';
  el('hint').style.display=m==='login'?'block':'none';
  show('');
}
function show(t,ok){var m=el('msg');m.className='msg'+(t?(ok?' ok':' err'):'');m.textContent=t;}
function busy(b){el('go').disabled=b;el('go').innerHTML=b?'<span class="spin"></span>':(M==='signup'?'إنشاء الحساب':'دخول');}
async function submit(){
  var email=el('email').value.trim(),pass=el('pass').value;
  if(!email||!pass){show('أدخل البريد وكلمة المرور');return;}
  if(pass.length<6){show('كلمة المرور 6 أحرف على الأقل');return;}
  busy(true);
  try{
    if(M==='signup'){
      var famname=el('famname').value.trim()||'عائلتي';
      var r=await sb.auth.signUp({email:email,password:pass,options:{data:{family_name:famname}}});
      if(r.error) throw r.error;
      if(r.data.session){ location.replace(APP); return; }
      show('تم إنشاء الحساب ✅ تحقّق من بريدك لتفعيله ثم سجّل الدخول',true); busy(false); mode('login');
    }else{
      var r2=await sb.auth.signInWithPassword({email:email,password:pass});
      if(r2.error) throw r2.error;
      location.replace(APP);
    }
  }catch(e){
    var m=(e&&e.message)||'حدث خطأ';
    if(/Invalid login/i.test(m)) m='البريد أو كلمة المرور غير صحيحة';
    else if(/already registered/i.test(m)) m='هذا البريد مسجّل مسبقاً — سجّل الدخول';
    else if(/Email not confirmed/i.test(m)) m='لم يُفعّل البريد بعد — تحقّق من رسالة التفعيل';
    show(m); busy(false);
  }
}
async function reset(){
  var email=el('email').value.trim();
  if(!email){show('اكتب بريدك أولاً ثم اضغط إعادة تعيين');return;}
  var r=await sb.auth.resetPasswordForEmail(email,{redirectTo:location.origin+location.pathname.replace(/[^/]*$/,'')+APP});
  if(r.error) show(r.error.message); else show('أرسلنا رابط إعادة التعيين إلى بريدك ✅',true);
}
el('pass').addEventListener('keydown',function(e){if(e.key==='Enter')submit();});
if(/signup|register/i.test(location.search)) mode('signup');
sb.auth.getSession().then(function(r){ if(r.data.session) location.replace(APP); });
</script>
</body>
</html>
