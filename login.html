<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5">
<meta name="theme-color" content="#0D1B2A">
<title>KidCoins — تسجيل الدخول</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--teal:#00C4B6;--teal2:#00A89C;--navy:#0D1B2A;--navy2:#0A1520;--navy3:#111F30;
  --gold:#F5C518;--gold2:#E0A800;--slate:#64748B;--red:#FF3355;--green:#22C55E;
  --border:rgba(255,255,255,.07);--card:rgba(255,255,255,.04);--text:#fff}
body{font-family:'Cairo',sans-serif;background:var(--navy);color:#fff;min-height:100vh;line-height:1.6;
  -webkit-font-smoothing:antialiased;overflow-x:hidden;display:flex;flex-direction:column;position:relative}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 60% 40% at 15% 0%,rgba(0,196,182,.10),transparent),
             radial-gradient(ellipse 50% 40% at 90% 100%,rgba(245,197,24,.07),transparent)}
.bgcoin{position:fixed;font-size:1.8rem;opacity:.05;pointer-events:none;user-select:none;z-index:0;animation:float 7s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-16px) rotate(10deg)}}
.topbar{position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;background:rgba(13,27,42,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.brand{display:flex;align-items:center;gap:10px}
.brand .icon{font-size:1.7rem;filter:drop-shadow(0 3px 8px rgba(0,196,182,.3))}
.brand .name{font-weight:900;font-size:1.05rem;letter-spacing:-.3px}
.brand .name span{color:var(--gold)}
.brand .lego{font-family:'Poppins',sans-serif;font-size:.5rem;color:var(--teal);letter-spacing:2.5px;font-weight:700;direction:ltr;text-align:left;margin-top:1px}
.back{display:flex;align-items:center;gap:6px;padding:9px 18px;border-radius:99px;border:1px solid var(--border);
  background:var(--card);color:#cbd5e1;font-family:inherit;font-weight:800;font-size:.8rem;cursor:pointer;text-decoration:none;transition:all .2s}
.back:hover{border-color:var(--teal);color:#fff}
.wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:26px 20px;position:relative;z-index:1}
.hero{text-align:center;margin-bottom:18px}
.hero .big{font-size:2.4rem;margin-bottom:6px;filter:drop-shadow(0 6px 18px rgba(0,196,182,.35))}
.hero h1{font-size:1.4rem;font-weight:900}
.hero h1 span{color:var(--gold)}
.hero p{font-size:.82rem;color:var(--slate);margin-top:5px;font-weight:600}
/* who toggle: parents vs kids */
.who{display:flex;gap:10px;width:100%;max-width:400px;margin-bottom:14px}
.who button{flex:1;padding:14px 10px;border-radius:16px;border:1.5px solid var(--border);background:var(--navy3);
  color:var(--slate);font-family:inherit;font-weight:900;font-size:.9rem;cursor:pointer;transition:.2s;
  display:flex;flex-direction:column;align-items:center;gap:4px}
.who button .e{font-size:1.4rem}
.who button.on{border-color:var(--teal);color:#fff;background:linear-gradient(160deg,rgba(0,196,182,.16),var(--navy3));
  box-shadow:0 6px 20px rgba(0,196,182,.2)}
.card{width:100%;max-width:400px;background:var(--navy3);border:1px solid var(--border);border-radius:22px;
  padding:24px 22px;box-shadow:0 24px 60px rgba(0,0,0,.4)}
.tabs{display:flex;background:var(--navy2);border-radius:99px;padding:5px;margin-bottom:16px;gap:4px}
.tab{flex:1;padding:11px;border:none;background:transparent;color:var(--slate);font-family:inherit;font-weight:900;font-size:.86rem;border-radius:99px;cursor:pointer;transition:.2s}
.tab.on{background:linear-gradient(135deg,var(--teal),var(--teal2));color:var(--navy);box-shadow:0 4px 18px rgba(0,196,182,.35)}
.tagline{text-align:center;font-size:.8rem;color:var(--slate);margin-bottom:14px;min-height:1.1em;font-weight:600}
label{display:block;font-size:.76rem;font-weight:700;color:var(--slate);margin:13px 0 6px}
input{width:100%;padding:13px 15px;background:var(--navy2);border:1px solid var(--border);border-radius:12px;
  color:#fff;font-family:inherit;font-size:.95rem;transition:.2s}
input.ltr{direction:ltr;text-align:left}
input.code{letter-spacing:3px;text-transform:uppercase;font-family:'Poppins',monospace;font-weight:700}
input.pin{letter-spacing:8px;text-align:center;font-size:1.3rem;font-weight:800}
input::placeholder{color:#3f4d63;letter-spacing:normal}
input:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px rgba(0,196,182,.13)}
.btn{width:100%;padding:15px;margin-top:20px;border:none;border-radius:99px;font-family:'Cairo','Poppins',sans-serif;
  font-weight:900;font-size:1.02rem;cursor:pointer;transition:.2s;background:linear-gradient(135deg,var(--teal),var(--teal2));
  color:var(--navy);box-shadow:0 6px 22px rgba(0,196,182,.32)}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.6;cursor:not-allowed}
.msg{margin-top:14px;padding:12px;border-radius:12px;font-size:.82rem;font-weight:600;text-align:center;display:none}
.msg.err{display:block;background:rgba(255,51,85,.12);color:#ff8095;border:1px solid rgba(255,51,85,.3)}
.msg.ok{display:block;background:rgba(34,197,94,.12);color:#5ee9a0;border:1px solid rgba(34,197,94,.3)}
.hint{text-align:center;font-size:.74rem;color:var(--slate);margin-top:14px;line-height:1.7}
.link{color:var(--teal);cursor:pointer;font-weight:700}
.spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(13,27,42,.3);border-top-color:var(--navy);border-radius:50%;animation:s .7s linear infinite;vertical-align:middle}
@keyframes s{to{transform:rotate(360deg)}}
.foot{text-align:center;font-size:.68rem;color:var(--slate);padding:14px;position:relative;z-index:1}
.hidden{display:none!important}
</style>
</head>
<body>
<span class="bgcoin" style="top:16%;left:8%">🪙</span>
<span class="bgcoin" style="top:26%;right:9%;animation-delay:1.5s">⭐</span>
<span class="bgcoin" style="bottom:18%;left:13%;animation-delay:3s">💰</span>

<div class="topbar">
  <div class="brand"><span class="icon">🏦</span>
    <div><div class="name">Kid<span>Coins</span></div><div class="lego">LEARN · EARN · GROW</div></div>
  </div>
  <a class="back" href="index.html">→ العودة للموقع</a>
</div>

<div class="wrap">
  <div class="hero">
    <div class="big">🏦</div>
    <h1>بنك <span>العائلة</span></h1>
    <p>دخول آمن — لكل فرد حسابه</p>
  </div>

  <div class="who">
    <button id="who-parent" class="on" onclick="who('parent')"><span class="e">👨‍👩‍👧</span>الأهل</button>
    <button id="who-child" onclick="who('child')"><span class="e">🧒</span>الأبناء</button>
  </div>

  <!-- PARENT card -->
  <div class="card" id="parent-card">
    <div class="tabs">
      <button class="tab on" id="tab-login" onclick="pmode('login')">تسجيل الدخول</button>
      <button class="tab" id="tab-signup" onclick="pmode('signup')">تجربة مجانية</button>
    </div>
    <div class="tagline" id="p-tagline">أهلاً بعودتك — سجّل دخول عائلتك</div>
    <div id="signup-name-wrap" class="hidden">
      <label>اسم العائلة</label>
      <input id="famname" type="text" placeholder="عائلة العيدروس">
    </div>
    <label>البريد الإلكتروني</label>
    <input id="email" class="ltr" type="email" placeholder="you@example.com" autocomplete="email">
    <label>كلمة المرور</label>
    <input id="pass" class="ltr" type="password" placeholder="••••••••" autocomplete="current-password">
    <button class="btn" id="p-go" onclick="parentSubmit()">دخول</button>
    <div class="msg" id="p-msg"></div>
    <div class="hint" id="p-hint">نسيت كلمة المرور؟ <span class="link" onclick="resetPw()">إعادة تعيين</span></div>
  </div>

  <!-- CHILD card -->
  <div class="card hidden" id="child-card">
    <div class="tagline">أدخل رمز عائلتك، اسمك، ورمزك السري</div>
    <label>رمز العائلة</label>
    <input id="c-code" class="ltr code" type="text" maxlength="8" placeholder="ABC123" autocomplete="off">
    <label>اسمك</label>
    <input id="c-name" type="text" placeholder="فارس" autocomplete="off">
    <label>الرمز السري (4 أرقام)</label>
    <input id="c-pin" class="ltr pin" type="password" inputmode="numeric" maxlength="4" placeholder="****" autocomplete="off">
    <button class="btn" id="c-go" onclick="childSubmit()">دخول 🚀</button>
    <div class="msg" id="c-msg"></div>
    <div class="hint">رمز العائلة يعطيك إياه والدك 👨‍👩‍👧</div>
  </div>
</div>

<div class="foot">© 2026 KidCoins · بنك العائلة الذكي</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
var URL_='https://ecuqkmvhrkulebmwmwan.supabase.co';
var KEY_='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVjdXFrbXZocmt1bGVibXdtd2FuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ1NzcwNTUsImV4cCI6MjEwMDE1MzA1NX0.0gdBC9JVCa_sQXpH4A4J4Ym2VrjtooZWWCR43ZZF4tg';
var APP='kidcoin-user.html';
var sb=window.supabase.createClient(URL_,KEY_,{auth:{persistSession:true,autoRefreshToken:true}});
var PM='login';
function el(id){return document.getElementById(id);}

function who(w){
  el('who-parent').classList.toggle('on',w==='parent');
  el('who-child').classList.toggle('on',w==='child');
  el('parent-card').classList.toggle('hidden',w!=='parent');
  el('child-card').classList.toggle('hidden',w!=='child');
}
// ---- parent ----
function pmode(m){
  PM=m;
  el('tab-login').classList.toggle('on',m==='login');
  el('tab-signup').classList.toggle('on',m==='signup');
  el('signup-name-wrap').classList.toggle('hidden',m!=='signup');
  el('p-go').textContent=m==='signup'?'إنشاء الحساب':'دخول';
  el('pass').setAttribute('autocomplete',m==='signup'?'new-password':'current-password');
  el('p-tagline').textContent=m==='signup'?'ابدأ مجاناً — أنشئ حساب عائلتك':'أهلاً بعودتك — سجّل دخول عائلتك';
  el('p-hint').style.display=m==='login'?'block':'none';
  pshow('');
}
function pshow(t,ok){var m=el('p-msg');m.className='msg'+(t?(ok?' ok':' err'):'');m.textContent=t;}
function pbusy(b){el('p-go').disabled=b;el('p-go').innerHTML=b?'<span class="spin"></span>':(PM==='signup'?'إنشاء الحساب':'دخول');}
async function parentSubmit(){
  var email=el('email').value.trim(),pass=el('pass').value;
  if(!email||!pass){pshow('أدخل البريد وكلمة المرور');return;}
  if(pass.length<6){pshow('كلمة المرور 6 أحرف على الأقل');return;}
  pbusy(true);
  try{
    // ensure any child session is cleared before a parent login
    try{ localStorage.removeItem('kc_child_session'); }catch(_){}
    if(PM==='signup'){
      var fn=el('famname').value.trim()||'عائلتي';
      var r=await sb.auth.signUp({email:email,password:pass,options:{data:{family_name:fn}}});
      if(r.error) throw r.error;
      if(r.data.session){ location.replace(APP); return; }
      pshow('تم إنشاء الحساب ✅ تحقّق من بريدك لتفعيله ثم سجّل الدخول',true); pbusy(false); pmode('login');
    }else{
      var r2=await sb.auth.signInWithPassword({email:email,password:pass});
      if(r2.error) throw r2.error;
      location.replace(APP);
    }
  }catch(e){
    var m=(e&&e.message)||'حدث خطأ';
    if(/Invalid login/i.test(m)) m='البريد أو كلمة المرور غير صحيحة';
    else if(/already registered/i.test(m)) m='هذا البريد مسجّل مسبقاً — سجّل الدخول';
    else if(/Email not confirmed/i.test(m)) m='لم يُفعّل البريد بعد — تحقّق من رسالة التفعيل';
    pshow(m); pbusy(false);
  }
}
async function resetPw(){
  var email=el('email').value.trim();
  if(!email){pshow('اكتب بريدك أولاً ثم اضغط إعادة تعيين');return;}
  var r=await sb.auth.resetPasswordForEmail(email,{redirectTo:location.origin+location.pathname.replace(/[^/]*$/,'')+APP});
  if(r.error) pshow(r.error.message); else pshow('أرسلنا رابط إعادة التعيين إلى بريدك ✅',true);
}
// ---- child ----
function cshow(t,ok){var m=el('c-msg');m.className='msg'+(t?(ok?' ok':' err'):'');m.textContent=t;}
function cbusy(b){el('c-go').disabled=b;el('c-go').innerHTML=b?'<span class="spin"></span>':'دخول 🚀';}
async function childSubmit(){
  var code=el('c-code').value.trim(),name=el('c-name').value.trim(),pin=el('c-pin').value.trim();
  if(!code||!name||!pin){cshow('أكمل الحقول الثلاثة');return;}
  if(!/^\d{4}$/.test(pin)){cshow('الرمز السري 4 أرقام');return;}
  cbusy(true);
  try{
    // fresh anonymous session for this child (replaces any previous session on this device)
    try{ await sb.auth.signOut(); }catch(_){}
    var a=await sb.auth.signInAnonymously();
    if(a.error) throw a.error;
    var r=await sb.rpc('child_login',{p_code:code,p_name:name,p_pin:pin});
    if(r.error) throw r.error;
    var rec=Array.isArray(r.data)?r.data[0]:r.data;
    if(!rec) throw new Error('not_found');
    localStorage.setItem('kc_child_session', JSON.stringify({
      owner_id:rec.owner_id, family_id:rec.family_id, child_key:rec.child_key, name:rec.name
    }));
    location.replace(APP);
  }catch(e){
    var m=(e&&(e.message||e.hint))||'حدث خطأ';
    if(/not_found/i.test(m)) m='الرمز أو الاسم غير صحيح';
    else if(/bad_pin/i.test(m)) m='الرمز السري غير صحيح';
    else if(/anonymous.*disabled|signups.*disabled/i.test(m)) m='الدخول المجهول غير مُفعّل — راجع الإعدادات';
    cshow(m); cbusy(false);
    try{ await sb.auth.signOut(); }catch(_){}
  }
}
el('c-pin').addEventListener('keydown',function(e){if(e.key==='Enter')childSubmit();});
el('pass').addEventListener('keydown',function(e){if(e.key==='Enter')parentSubmit();});
if(/signup|register/i.test(location.search)) pmode('signup');
if(/child|kid/i.test(location.search)) who('child');
// already signed in as a parent? go to the app
sb.auth.getSession().then(function(r){
  var s=r.data.session;
  if(s && !s.user.is_anonymous && !localStorage.getItem('kc_child_session')) location.replace(APP);
});
</script>
</body>
</html>
