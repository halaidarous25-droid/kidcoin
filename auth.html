<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5">
<title>KidCoins — تسجيل الدخول</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--teal:#00C4B6;--teal2:#00A89C;--navy:#0D1B2A;--navy3:#111F30;--gold:#F5C518;--red:#FF5C6C;--slate:#64748B;--border:rgba(255,255,255,.08);}
html{font-size:16px;}
body{font-family:'Cairo',sans-serif;background:
  radial-gradient(ellipse 60% 50% at 25% 15%,rgba(0,196,182,.14),transparent),
  radial-gradient(ellipse 50% 50% at 80% 85%,rgba(245,197,24,.08),transparent),var(--navy);
  color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;line-height:1.6;-webkit-font-smoothing:antialiased;}
[lang="en"] body{font-family:'Inter','Poppins',sans-serif;}
[lang="en"] h1,[lang="en"] h2{font-family:'Poppins',sans-serif;}

.card{width:100%;max-width:420px;background:linear-gradient(160deg,var(--navy3),rgba(13,27,42,.98));
  border:1px solid rgba(0,196,182,.2);border-radius:26px;padding:34px 30px 28px;
  box-shadow:0 26px 80px rgba(0,0,0,.5);position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:-80px;left:-60px;width:220px;height:220px;
  background:radial-gradient(circle,rgba(0,196,182,.1),transparent 70%);border-radius:50%;pointer-events:none;}

.top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
.logo{height:60px;width:auto;object-fit:contain;position:relative;z-index:1;filter:drop-shadow(0 6px 18px rgba(0,196,182,.3));}
.lang-btn{width:36px;height:36px;border-radius:99px;border:1.5px solid rgba(0,196,182,.35);
  background:rgba(0,196,182,.08);color:var(--teal);font-family:'Poppins',sans-serif;font-size:.75rem;font-weight:700;cursor:pointer;z-index:1;}
.lang-btn:hover{background:rgba(0,196,182,.16);}

/* Tabs */
.tabs{display:flex;gap:4px;background:rgba(255,255,255,.04);border-radius:14px;padding:4px;margin:18px 0 22px;position:relative;z-index:1;}
.tab{flex:1;padding:10px;border:none;background:none;cursor:pointer;border-radius:11px;
  font-family:'Cairo','Poppins',sans-serif;font-size:.82rem;font-weight:700;color:rgba(255,255,255,.5);transition:all .2s;}
.tab.active{background:linear-gradient(135deg,var(--teal),var(--teal2));color:var(--navy);box-shadow:0 4px 14px rgba(0,196,182,.3);}

.pane{display:none;position:relative;z-index:1;}
.pane.active{display:block;animation:fade .3s ease;}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

h1{font-size:1.4rem;font-weight:900;margin-bottom:4px;}
.sub{font-size:.82rem;color:rgba(255,255,255,.45);margin-bottom:20px;}

.field{margin-bottom:14px;}
.field label{display:block;font-size:.75rem;font-weight:700;color:rgba(255,255,255,.6);margin-bottom:6px;}
.field input{width:100%;padding:12px 14px;border-radius:12px;border:1.5px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.04);color:#fff;font-family:'Cairo','Poppins',sans-serif;font-size:.9rem;outline:none;transition:all .2s;}
.field input:focus{border-color:var(--teal);background:rgba(0,196,182,.06);}
.field input::placeholder{color:rgba(255,255,255,.25);}
.field input.err{border-color:var(--red);}
.pass-wrap{position:relative;}
.eye{position:absolute;inset-inline-end:8px;top:50%;transform:translateY(-50%);border:none;background:none;cursor:pointer;font-size:1rem;opacity:.5;padding:4px;}
.eye:hover{opacity:1;}

.msg{font-size:.78rem;min-height:20px;margin:2px 0 10px;font-weight:700;text-align:center;}
.msg.error{color:var(--red);}
.msg.ok{color:var(--teal);}

.btn{width:100%;padding:13px;border-radius:12px;border:none;cursor:pointer;
  font-family:'Cairo','Poppins',sans-serif;font-size:.95rem;font-weight:900;
  background:linear-gradient(135deg,var(--teal),var(--teal2));color:var(--navy);
  box-shadow:0 6px 20px rgba(0,196,182,.32);transition:all .22s;margin-top:4px;}
.btn:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(0,196,182,.48);}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.btn.spin{color:transparent;position:relative;}
.btn.spin::after{content:'';position:absolute;inset:0;margin:auto;width:18px;height:18px;
  border:2px solid rgba(13,27,42,.4);border-top-color:var(--navy);border-radius:50%;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}

.link{display:block;width:100%;text-align:center;margin-top:12px;border:none;background:none;cursor:pointer;
  font-family:'Cairo','Poppins',sans-serif;font-size:.76rem;font-weight:600;color:rgba(255,255,255,.42);transition:color .2s;}
.link:hover{color:var(--teal);}
.divider{display:flex;align-items:center;gap:10px;margin:18px 0;color:rgba(255,255,255,.25);font-size:.68rem;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.08);}

.child-note{font-size:.7rem;color:rgba(255,255,255,.3);text-align:center;margin-top:8px;line-height:1.6;}
.back-home{position:fixed;top:18px;inset-inline-start:18px;color:rgba(255,255,255,.4);text-decoration:none;font-size:.8rem;font-weight:700;z-index:10;transition:color .2s;}
.back-home:hover{color:var(--teal);}
</style>
</head>

  <!-- LOGIN (parent) -->
  <div class="pane active" id="pane-login">
    <h1 data-t="loginH">مرحباً بعودتك 👋</h1>
    <p class="sub" data-t="loginSub">سجّل دخولك لإدارة حساب عائلتك</p>
    <div class="field"><label data-t="email">البريد الإلكتروني</label>
      <input type="email" id="li-email" placeholder="you@example.com" autocomplete="email"></div>
    <div class="field"><label data-t="password">كلمة المرور</label>
      <div class="pass-wrap"><input type="password" id="li-pass" placeholder="••••••••" autocomplete="current-password">
      <button class="eye" onclick="tp('li-pass')">👁️</button></div></div>
    <div class="msg" id="li-msg"></div>
    <button class="btn" id="li-btn" onclick="doLogin()" data-t="loginBtn">🔑 تسجيل الدخول</button>
    <button class="link" onclick="doReset()" data-t="forgot">نسيت كلمة المرور؟</button>
  </div>

  <!-- SIGNUP (parent) -->
  <div class="pane" id="pane-signup">
    <h1 data-t="signupH">أنشئ حساب عائلتك 🏠</h1>
    <p class="sub" data-t="signupSub">مجاني · دقيقة واحدة · تحكم كامل</p>
    <div class="field"><label data-t="fullName">اسمك</label>
      <input type="text" id="su-name" placeholder="حصة العيدروس"></div>
    <div class="field"><label data-t="familyName">اسم العائلة</label>
      <input type="text" id="su-family" placeholder="عائلة العيدروس"></div>
    <div class="field"><label data-t="email">البريد الإلكتروني</label>
      <input type="email" id="su-email" placeholder="you@example.com" autocomplete="email"></div>
    <div class="field"><label data-t="password">كلمة المرور</label>
      <div class="pass-wrap"><input type="password" id="su-pass" placeholder="8 أحرف على الأقل" autocomplete="new-password">
      <button class="eye" onclick="tp('su-pass')">👁️</button></div></div>
    <div class="msg" id="su-msg"></div>
    <button class="btn" id="su-btn" onclick="doSignup()" data-t="signupBtn">✨ إنشاء الحساب</button>
    <p class="child-note" data-t="signupNote">بإنشائك الحساب، ستتمكن من إضافة أطفالك وإعطائهم رموز دخول خاصة.</p>
  </div>

  <!-- CHILD login -->
  <div class="pane" id="pane-child">
    <h1 data-t="childH">دخول الطفل 🧒</h1>
    <p class="sub" data-t="childSub">استخدم رمز العائلة واسمك ورمزك السري</p>
    <div class="field"><label data-t="familyCode">رمز العائلة</label>
      <input type="text" id="ch-code" placeholder="ABCD1234" style="text-transform:uppercase;letter-spacing:2px"></div>
    <div class="field"><label data-t="childUser">اسم المستخدم</label>
      <input type="text" id="ch-user" placeholder="faris"></div>
    <div class="field"><label data-t="pin">الرمز السري (4 أرقام)</label>
      <input type="tel" id="ch-pin" placeholder="••••" maxlength="4" inputmode="numeric"></div>
    <div class="msg" id="ch-msg"></div>
    <button class="btn" id="ch-btn" onclick="doChild()" data-t="childBtn">🎈 دخول</button>
    <p class="child-note" data-t="childNote">رمز العائلة يجده والدك في إعدادات التطبيق.</p>
  </div>
</div>

<!-- Supabase JS + app scripts -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/kidcoins-api.js"></script>
<script>
// ── i18n ──
const T={
  ar:{dir:"rtl",backHome:"← الرئيسية",tabLogin:"دخول",tabSignup:"حساب جديد",tabChild:"دخول طفل",
    loginH:"مرحباً بعودتك 👋",loginSub:"سجّل دخولك لإدارة حساب عائلتك",email:"البريد الإلكتروني",password:"كلمة المرور",
    loginBtn:"🔑 تسجيل الدخول",forgot:"نسيت كلمة المرور؟",
    signupH:"أنشئ حساب عائلتك 🏠",signupSub:"مجاني · دقيقة واحدة · تحكم كامل",fullName:"اسمك",familyName:"اسم العائلة",
    signupBtn:"✨ إنشاء الحساب",signupNote:"بإنشائك الحساب، ستتمكن من إضافة أطفالك وإعطائهم رموز دخول خاصة.",
    childH:"دخول الطفل 🧒",childSub:"استخدم رمز العائلة واسمك ورمزك السري",familyCode:"رمز العائلة",childUser:"اسم المستخدم",
    pin:"الرمز السري (4 أرقام)",childBtn:"🎈 دخول",childNote:"رمز العائلة يجده والدك في إعدادات التطبيق."},
  en:{dir:"ltr",backHome:"← Home",tabLogin:"Log In",tabSignup:"Sign Up",tabChild:"Child Login",
    loginH:"Welcome back 👋",loginSub:"Sign in to manage your family account",email:"Email",password:"Password",
    loginBtn:"🔑 Log In",forgot:"Forgot password?",
    signupH:"Create your family 🏠",signupSub:"Free · One minute · Full control",fullName:"Your name",familyName:"Family name",
    signupBtn:"✨ Create Account",signupNote:"After signing up you can add your children and give them private login codes.",
    childH:"Child Login 🧒",childSub:"Use your family code, username and PIN",familyCode:"Family Code",childUser:"Username",
    pin:"PIN (4 digits)",childBtn:"🎈 Enter",childNote:"Your parent finds the family code in the app settings."}
};
let lang='ar';
function applyLang(l){lang=l;const t=T[l];
  document.documentElement.dir=t.dir;document.documentElement.lang=l;
  document.body.style.fontFamily=l==='en'?"'Inter','Poppins',sans-serif":"'Cairo',sans-serif";
  document.querySelectorAll('[data-t]').forEach(e=>{if(t[e.dataset.t])e.textContent=t[e.dataset.t];});
  document.getElementById('langBtn').textContent=l==='ar'?'EN':'ع';
  localStorage.setItem('kc_lang',l);}
function toggleLang(){applyLang(lang==='ar'?'en':'ar');}

function showPane(p){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.pane===p));
  document.querySelectorAll('.pane').forEach(pn=>pn.classList.toggle('active',pn.id==='pane-'+p));
}
function tp(id){const el=document.getElementById(id);el.type=el.type==='password'?'text':'password';}
function msg(id,text,ok){const m=document.getElementById(id);m.textContent=text;m.className='msg '+(ok?'ok':'error');}
function busy(btnId,on){const b=document.getElementById(btnId);b.disabled=on;b.classList.toggle('spin',on);}

function friendly(e){
  const m=(e&&e.message)||String(e);
  if(/Invalid login/i.test(m)) return lang==='ar'?'البريد أو كلمة المرور غير صحيحة':'Invalid email or password';
  if(/already registered/i.test(m)) return lang==='ar'?'هذا البريد مسجّل مسبقاً':'This email is already registered';
  if(/Email not confirmed/i.test(m)) return lang==='ar'?'يرجى تأكيد بريدك أولاً':'Please confirm your email first';
  if(/at least 6/i.test(m)) return lang==='ar'?'كلمة المرور قصيرة جداً':'Password too short';
  if(/wrong PIN/i.test(m)) return lang==='ar'?'الرمز السري غير صحيح':'Wrong PIN';
  if(/family not found/i.test(m)) return lang==='ar'?'رمز العائلة غير موجود':'Family code not found';
  if(/child not found/i.test(m)) return lang==='ar'?'اسم المستخدم غير موجود':'Username not found';
  return m;
}

// ── PARENT LOGIN ──
async function doLogin(){
  const email=document.getElementById('li-email').value.trim();
  const pass =document.getElementById('li-pass').value;
  if(!email||!pass){msg('li-msg',lang==='ar'?'أكمل جميع الحقول':'Fill all fields');return;}
  busy('li-btn',true);msg('li-msg','',true);
  try{ await KC.signIn({email,password:pass});
    location.href='dashboard.html';
  }catch(e){ msg('li-msg',friendly(e)); busy('li-btn',false); }
}

// ── PARENT SIGNUP ──
async function doSignup(){
  const name=document.getElementById('su-name').value.trim();
  const fam =document.getElementById('su-family').value.trim();
  const email=document.getElementById('su-email').value.trim();
  const pass =document.getElementById('su-pass').value;
  if(!name||!email||!pass){msg('su-msg',lang==='ar'?'أكمل الحقول المطلوبة':'Fill required fields');return;}
  if(pass.length<8){msg('su-msg',lang==='ar'?'كلمة المرور 8 أحرف على الأقل':'Password ≥ 8 chars');return;}
  busy('su-btn',true);msg('su-msg','',true);
  try{
    const r=await KC.signUp({email,password:pass,fullName:name,familyName:fam||('عائلة '+name),locale:lang});
    if(r.session){ location.href='dashboard.html'; }        // email-confirm OFF
    else { msg('su-msg',lang==='ar'?'✅ تحقق من بريدك لتأكيد الحساب':'✅ Check your email to confirm',true); busy('su-btn',false); }
  }catch(e){ msg('su-msg',friendly(e)); busy('su-btn',false); }
}

// ── PASSWORD RESET ──
async function doReset(){
  const email=document.getElementById('li-email').value.trim();
  if(!email){msg('li-msg',lang==='ar'?'أدخل بريدك أولاً':'Enter your email first');return;}
  try{ await KC.resetPassword(email);
    msg('li-msg',lang==='ar'?'✅ أرسلنا رابط إعادة التعيين':'✅ Reset link sent',true);
  }catch(e){ msg('li-msg',friendly(e)); }
}

// ── CHILD LOGIN ──
async function doChild(){
  const code=document.getElementById('ch-code').value.trim();
  const user=document.getElementById('ch-user').value.trim();
  const pin =document.getElementById('ch-pin').value.trim();
  if(!code||!user||!pin){msg('ch-msg',lang==='ar'?'أكمل جميع الحقول':'Fill all fields');return;}
  busy('ch-btn',true);msg('ch-msg','',true);
  try{ await KC.childLogin({familyCode:code,username:user,pin});
    location.href='dashboard.html#child';
  }catch(e){ msg('ch-msg',friendly(e)); busy('ch-btn',false); }
}

// Enter-key support
document.addEventListener('keydown',e=>{if(e.key!=='Enter')return;
  const p=document.querySelector('.pane.active').id;
  if(p==='pane-login')doLogin(); else if(p==='pane-signup')doSignup(); else doChild();});

// ── init: open requested tab + redirect if already logged in ──
(async function(){
  applyLang(localStorage.getItem('kc_lang')||'ar');
  const h=(location.hash||'').replace('#','');       // #signup / #login / #child from the landing page
  if(h==='signup'||h==='child'||h==='login') showPane(h);
  try{ const s=await KC.getSession(); if(s){ location.href='dashboard.html'; return; } }catch(_){}
})();
</script>
</body>
</html>
