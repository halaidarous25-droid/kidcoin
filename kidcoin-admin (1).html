<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>بنك العائلة — لوحة الإدارة</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --gold:#F5C518;--red:#FF3355;--green:#00E5A0;--blue:#2979FF;
  --teal:#00C4CC;--orange:#FF8C00;--purple:#8B5CF6;
  --bg:#080e1c;--card:rgba(255,255,255,.04);--card2:rgba(255,255,255,.06);
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.12);
  --text:#fff;--muted:rgba(255,255,255,.4);--muted2:rgba(255,255,255,.25);
}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Cairo',sans-serif;}
/* ── AUTH ─────────────────────────────── */
#auth{height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;
  background:radial-gradient(ellipse at 40% 30%,rgba(245,197,24,.07),transparent 55%),
             radial-gradient(ellipse at 70% 70%,rgba(0,196,204,.05),transparent 55%),var(--bg);}
.auth-glass{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:32px 28px;width:100%;max-width:340px;text-align:center;}
.auth-icon{font-size:2.8rem;margin-bottom:10px;filter:drop-shadow(0 4px 16px rgba(245,197,24,.3));}
.auth-title{font-size:1.3rem;font-weight:900;color:var(--gold);margin-bottom:4px;}
.auth-sub{font-size:.7rem;color:var(--muted2);margin-bottom:24px;letter-spacing:.5px;}
.auth-input{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:13px 15px;color:#fff;font-family:'Cairo',sans-serif;font-size:.92rem;margin-bottom:10px;outline:none;transition:border-color .2s;}
.auth-input:focus{border-color:rgba(245,197,24,.5);}
.auth-input[type="password"]{letter-spacing:6px;font-size:1.1rem;}
.auth-input[type="password"]::placeholder{letter-spacing:normal;font-size:.86rem;}
.auth-btn{width:100%;border:none;border-radius:12px;padding:13px;background:linear-gradient(135deg,var(--gold),#c07a10);color:#0a0800;font-family:'Cairo',sans-serif;font-size:.92rem;font-weight:900;cursor:pointer;margin-top:4px;transition:opacity .2s;}
.auth-btn:active{opacity:.85;}
.auth-err{font-size:.72rem;color:var(--red);min-height:18px;margin-bottom:8px;font-weight:700;}
/* ── SHELL ─────────────────────────────── */
#shell{display:none;flex-direction:column;height:100vh;overflow:hidden;}
#shell.show{display:flex;}
/* Header */
.hdr{background:rgba(8,14,28,.95);border-bottom:1px solid rgba(245,197,24,.12);padding:0 16px;height:54px;display:flex;align-items:center;gap:10px;flex-shrink:0;backdrop-filter:blur(12px);}
.hdr-logo{width:34px;height:34px;border-radius:9px;background:rgba(245,197,24,.12);border:1px solid rgba(245,197,24,.2);display:flex;align-items:center;justify-content:center;font-size:1rem;}
.hdr-title{font-size:.96rem;font-weight:900;color:var(--gold);}
.hdr-sub{font-size:.56rem;color:rgba(245,197,24,.4);letter-spacing:.6px;}
.hdr-spacer{flex:1;}
.hdr-btn{border:1px solid var(--border2);background:var(--card);border-radius:8px;padding:6px 12px;font-family:'Cairo',sans-serif;font-size:.7rem;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:4px;transition:all .15s;}
.hdr-btn:hover{border-color:var(--gold);color:var(--gold);}
/* Sidebar + Content */
.layout{flex:1;display:flex;overflow:hidden;}
/* Sidebar nav */
.sidebar{width:200px;flex-shrink:0;background:rgba(0,0,0,.2);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;}
@media(max-width:640px){.sidebar{display:none;}}
.nav-item{display:flex;align-items:center;gap:9px;padding:11px 16px;cursor:pointer;transition:all .18s;border-right:2px solid transparent;font-size:.8rem;color:var(--muted);}
.nav-item:hover{background:rgba(255,255,255,.03);color:var(--text);}
.nav-item.active{background:rgba(245,197,24,.05);border-right-color:var(--gold);color:var(--gold);font-weight:700;}
.nav-icon{font-size:1.1rem;width:22px;text-align:center;}
.nav-section{font-size:.58rem;color:var(--muted2);padding:14px 16px 4px;letter-spacing:1px;text-transform:uppercase;}
/* Content area */
.content{flex:1;overflow-y:auto;background:var(--bg);}
.page{display:none;padding:18px;max-width:900px;}
.page.active{display:block;}
/* Mobile bottom nav */
.mob-nav{display:none;background:rgba(8,14,28,.96);border-top:1px solid var(--border);padding:6px 0 max(6px,env(safe-area-inset-bottom));position:fixed;bottom:0;left:0;right:0;z-index:200;}
@media(max-width:640px){.mob-nav{display:flex;justify-content:space-around;}.content{padding-bottom:68px;}}
.mob-nav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:4px 8px;flex:1;border:none;background:none;font-family:'Cairo',sans-serif;}
.mob-nav-btn .mn-ic{font-size:1.3rem;}
.mob-nav-btn .mn-lbl{font-size:.55rem;color:var(--muted2);}
.mob-nav-btn.active .mn-ic,.mob-nav-btn.active .mn-lbl{color:var(--gold);}
/* ── COMMON COMPONENTS ─────────────────── */
.pg-title{font-size:1.1rem;font-weight:900;color:var(--gold);margin-bottom:4px;}
.pg-sub{font-size:.68rem;color:var(--muted2);margin-bottom:18px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:12px;}
.card-hdr{padding:12px 15px;font-size:.8rem;font-weight:700;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-body{padding:14px 15px;}
/* Stats grid */
.stats-row{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px;}
@media(min-width:480px){.stats-row{grid-template-columns:repeat(4,1fr);}}
.stat-c{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 12px;text-align:center;}
.stat-n{font-size:1.9rem;font-weight:900;font-family:'Cairo',sans-serif;}
.stat-l{font-size:.61rem;color:var(--muted2);margin-top:3px;}
/* Table */
.tbl{width:100%;border-collapse:collapse;font-size:.76rem;}
.tbl th{text-align:right;padding:9px 12px;font-size:.65rem;color:var(--muted2);font-weight:700;border-bottom:1px solid var(--border);background:rgba(255,255,255,.02);}
.tbl td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:rgba(255,255,255,.02);}
/* Badges */
.badge{border-radius:99px;padding:3px 9px;font-size:.62rem;font-weight:700;}
.badge-green{background:rgba(0,229,160,.1);color:var(--green);}
.badge-red{background:rgba(255,51,85,.1);color:var(--red);}
.badge-gold{background:rgba(245,197,24,.1);color:var(--gold);}
.badge-blue{background:rgba(41,121,255,.1);color:var(--blue);}
.badge-purple{background:rgba(139,92,246,.1);color:var(--purple);}
/* Progress bar */
.prog{height:6px;background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden;margin-top:5px;}
.prog-fill{height:100%;border-radius:99px;transition:width .6s;}
/* Action buttons */
.act-btn{border:none;border-radius:8px;padding:6px 11px;font-family:'Cairo',sans-serif;font-size:.68rem;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:4px;transition:all .15s;}
.act-btn:active{transform:scale(.96);}
/* ── FAMILY DETAIL PANEL ───────────────── */
.fam-detail-hero{background:linear-gradient(135deg,rgba(255,255,255,.04),rgba(255,255,255,.02));border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:14px;display:flex;align-items:center;gap:14px;}
.fam-hero-av{width:60px;height:60px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:2rem;flex-shrink:0;}
.fam-hero-info{flex:1;}
.fam-hero-name{font-size:1.1rem;font-weight:900;}
.fam-hero-meta{font-size:.66rem;color:var(--muted2);margin-top:4px;}
.fam-hero-kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px;}
.fam-kpi{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center;}
.fam-kpi-n{font-size:1.1rem;font-weight:900;}
.fam-kpi-l{font-size:.58rem;color:var(--muted2);margin-top:2px;}
/* Members grid in family detail */
.members-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:9px;margin-bottom:14px;}
.member-card{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:13px 10px;text-align:center;position:relative;}
.member-card-av{font-size:2rem;display:block;margin-bottom:6px;}
.member-card-name{font-size:.8rem;font-weight:700;}
.member-card-pts{font-size:.7rem;font-weight:900;margin-top:3px;}
.member-card-role{font-size:.58rem;color:var(--muted2);margin-top:2px;}
/* Chart bars */
.bar-chart{display:flex;flex-direction:column;gap:8px;}
.bar-row{display:flex;align-items:center;gap:10px;}
.bar-label{font-size:.72rem;width:100px;text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bar-track{flex:1;height:22px;background:rgba(255,255,255,.05);border-radius:6px;overflow:hidden;position:relative;}
.bar-fill{height:100%;border-radius:6px;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;transition:width .8s;}
.bar-val{font-size:.65rem;font-weight:700;color:#fff;}
/* Report cards */
.report-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
@media(max-width:500px){.report-grid{grid-template-columns:1fr;}}
.report-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;}
.rc-title{font-size:.76rem;font-weight:700;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:6px;}
/* Modal */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:1000;display:none;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(10px);}
.modal-ov.show{display:flex;animation:mshow .2s ease;}
@keyframes mshow{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
.modal{background:#0f1625;border:1px solid var(--border2);border-radius:18px;padding:22px;width:100%;max-width:420px;}
.modal-title{font-size:.96rem;font-weight:700;color:var(--gold);margin-bottom:16px;}
.m-field{margin-bottom:12px;}
.m-label{font-size:.7rem;color:var(--muted2);margin-bottom:5px;display:block;font-weight:700;}
.m-input{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:10px 13px;color:#fff;font-family:'Cairo',sans-serif;font-size:.88rem;outline:none;transition:border-color .2s;}
.m-input:focus{border-color:rgba(245,197,24,.4);}
.m-err{font-size:.7rem;color:var(--red);min-height:18px;margin-bottom:6px;}
.m-btns{display:flex;gap:8px;margin-top:4px;}
.m-ok{flex:1;border:none;border-radius:10px;padding:11px;background:linear-gradient(135deg,var(--teal),var(--blue));color:#fff;font-family:'Cairo',sans-serif;font-size:.84rem;font-weight:700;cursor:pointer;}
.m-cancel{border:1px solid var(--border2);border-radius:10px;padding:11px 16px;background:rgba(255,255,255,.04);color:var(--muted);font-family:'Cairo',sans-serif;font-size:.82rem;cursor:pointer;}
/* Icon/Color pickers */
.picker-row{display:flex;gap:7px;flex-wrap:wrap;margin:6px 0 12px;}
.ic-opt{width:38px;height:38px;border-radius:9px;border:2px solid var(--border);background:rgba(255,255,255,.04);display:flex;align-items:center;justify-content:center;font-size:1.2rem;cursor:pointer;transition:all .15s;}
.ic-opt.sel{border-color:var(--gold);background:rgba(245,197,24,.1);}
.cl-opt{width:26px;height:26px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .15s;}
.cl-opt.sel{border-color:#fff;transform:scale(1.18);}
/* Toast */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1e293b;border:1px solid rgba(255,255,255,.15);border-radius:10px;padding:9px 18px;font-size:.78rem;font-weight:700;color:#fff;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;}

/* ── SUPER ADMIN EXTRAS ─────────────────────────── */
.inp{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:10px 13px;color:#fff;font-family:'Cairo',sans-serif;font-size:.86rem;outline:none;transition:border-color .2s;box-sizing:border-box;margin-bottom:8px;}
.inp:focus{border-color:rgba(245,197,24,.4);}
.inp[type="password"]{letter-spacing:4px;text-align:center;}
.inp[type="password"]::placeholder{letter-spacing:normal;}
.inp-row{display:flex;gap:7px;margin-bottom:8px;}
.inp-row .inp{margin-bottom:0;}
.save-btn{border:none;border-radius:9px;padding:9px 16px;background:linear-gradient(135deg,var(--teal),var(--blue));color:#fff;font-family:'Cairo',sans-serif;font-size:.78rem;font-weight:700;cursor:pointer;white-space:nowrap;}
.del-btn{border:none;border-radius:9px;padding:9px 12px;background:rgba(255,51,85,.1);color:var(--red);font-family:'Cairo',sans-serif;font-size:.78rem;font-weight:700;cursor:pointer;border:1px solid rgba(255,51,85,.2);white-space:nowrap;}
.child-edit-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:12px;margin-bottom:9px;}
.child-edit-hdr{display:flex;align-items:center;gap:9px;margin-bottom:10px;}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:.76rem;color:rgba(255,255,255,.7);}
.toggle-row:last-child{border-bottom:none;}
.ts{position:relative;display:inline-flex;align-items:center;cursor:pointer;width:38px;height:22px;}
.ts input{opacity:0;width:0;height:0;position:absolute;}
.tsl{position:absolute;inset:0;background:rgba(255,255,255,.15);border-radius:22px;transition:.3s;}
.ts input:checked+.tsl{background:var(--green);}
.tsl::before{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;left:3px;top:3px;transition:.3s;}
.ts input:checked+.tsl::before{transform:translateX(16px);}
.pend-badge{background:var(--red);color:#fff;border-radius:99px;padding:2px 7px;font-size:.6rem;font-weight:900;display:inline-block;}

</style>
</head>
<body>
<!-- ── AUTH ─────────────────── -->
<div id="auth">
  <div class="auth-glass">
    <div class="auth-icon">🛡️</div>
    <div class="auth-title">لوحة الإدارة</div>
    <div class="auth-sub">ADMIN DASHBOARD · بنك العائلة</div>
    <input class="auth-input" id="adm-u" type="text" placeholder="اسم المستخدم"
           autocomplete="off" autocapitalize="off" spellcheck="false"
           onkeydown="if(event.key==='Enter')getElementById('adm-p').focus()">
    <input class="auth-input" id="adm-p" type="password" placeholder="••••"
           autocomplete="current-password"
           onkeydown="if(event.key==='Enter')doLogin()">
    <div class="auth-err" id="adm-err"></div>
    <button class="auth-btn" onclick="doLogin()">دخول لوحة الإدارة ←</button>
  </div>
</div>
<!-- ── SHELL ─────────────────── -->
<div id="shell">
  <!-- Header -->
  <div class="hdr">
    <div class="hdr-logo">🛡️</div>
    <div><div class="hdr-title">لوحة الإدارة</div><div class="hdr-sub">ADMIN</div></div>
    <div class="hdr-spacer"></div>
    <button class="hdr-btn" onclick="doLogout()"><span>🚪</span>خروج</button>
  </div>
  <!-- Layout -->
  <div class="layout">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="nav-section">عام</div>
      <div class="nav-item active" onclick="nav('overview',this)"><span class="nav-icon">📊</span>نظرة عامة</div>
      <div class="nav-item" onclick="nav('reports',this)"><span class="nav-icon">📈</span>التقارير</div>
      <div class="nav-section">إدارة</div>
      <div class="nav-item" onclick="nav('families',this)"><span class="nav-icon">👨‍👩‍👧‍👦</span>الأسر</div>
      <div class="nav-item" onclick="nav('parents',this)"><span class="nav-icon">👤</span>لوحات الوالدين</div>
      <div class="nav-item" onclick="nav('users',this)"><span class="nav-icon">🔑</span>المستخدمون</div>
      <div class="nav-section">النظام</div>
      <div class="nav-item" onclick="nav('settings',this)"><span class="nav-icon">⚙️</span>الإعدادات</div>
    </div>
    <!-- Pages -->
    <div class="content">
      <div class="page active" id="pg-overview"></div>
      <div class="page" id="pg-reports"></div>
      <div class="page" id="pg-families"></div>
      <div class="page" id="pg-parents"></div>
      <div class="page" id="pg-users"></div>
      <div class="page" id="pg-settings"></div>
    </div>
  </div>
  <!-- Mobile nav -->
  <div class="mob-nav">
    <button class="mob-nav-btn active" onclick="nav('overview',this)" id="mn-overview"><span class="mn-ic">📊</span><span class="mn-lbl">عام</span></button>
    <button class="mob-nav-btn" onclick="nav('families',this)" id="mn-families"><span class="mn-ic">👨‍👩‍👧‍👦</span><span class="mn-lbl">الأسر</span></button>
    <button class="mob-nav-btn" onclick="nav('parents',this)" id="mn-parents"><span class="mn-ic">👤</span><span class="mn-lbl">الوالدون</span></button>
    <button class="mob-nav-btn" onclick="nav('reports',this)" id="mn-reports"><span class="mn-ic">📈</span><span class="mn-lbl">تقارير</span></button>
    <button class="mob-nav-btn" onclick="nav('settings',this)" id="mn-settings"><span class="mn-ic">⚙️</span><span class="mn-lbl">إعدادات</span></button>
  </div>
</div>
<!-- Modals -->
<div class="modal-ov" id="md-edit-parent">
  <div class="modal">
    <div class="modal-title" id="md-ep-title">✏️ تعديل حساب الوالدين</div>
    <div class="m-field"><label class="m-label">اسم الأسرة</label><input class="m-input" id="ep-name"></div>
    <div class="m-field"><label class="m-label">اسم المستخدم (للدخول)</label><input class="m-input" id="ep-user" autocapitalize="off"></div>
    <div class="m-field"><label class="m-label">كلمة المرور الجديدة (اتركها فارغة للإبقاء)</label><input class="m-input" id="ep-pass" type="password" placeholder="••••"></div>
    <div class="m-err" id="ep-err"></div>
    <div class="m-btns">
      <button class="m-cancel" onclick="closeModal('md-edit-parent')">إلغاء</button>
      <button class="m-ok" onclick="saveEditParent()">💾 حفظ</button>
    </div>
  </div>
</div>
<div class="modal-ov" id="md-add-fam">
  <div class="modal">
    <div class="modal-title">➕ إضافة أسرة جديدة</div>
    <div class="m-field"><label class="m-label">اسم الأسرة *</label><input class="m-input" id="nf-name"></div>
    <div class="m-field"><label class="m-label">اسم المستخدم للوالدين *</label><input class="m-input" id="nf-user" autocapitalize="off"></div>
    <div class="m-field"><label class="m-label">كلمة المرور *</label><input class="m-input" id="nf-pass" type="password" placeholder="4 أرقام على الأقل"></div>
    <div class="m-label" style="margin-bottom:5px">الأيقونة</div>
    <div class="picker-row" id="ic-pick">
      <div class="ic-opt sel" data-v="👨‍👩‍👧‍👦" onclick="pickIc(this)">👨‍👩‍👧‍👦</div><div class="ic-opt" data-v="🏡" onclick="pickIc(this)">🏡</div>
      <div class="ic-opt" data-v="🌟" onclick="pickIc(this)">🌟</div><div class="ic-opt" data-v="💎" onclick="pickIc(this)">💎</div>
      <div class="ic-opt" data-v="🦁" onclick="pickIc(this)">🦁</div><div class="ic-opt" data-v="🏆" onclick="pickIc(this)">🏆</div>
    </div>
    <div class="m-label" style="margin-bottom:5px">اللون</div>
    <div class="picker-row" id="cl-pick">
      <div class="cl-opt sel" data-v="#E9C46A" onclick="pickCl(this)" style="background:#E9C46A"></div>
      <div class="cl-opt" data-v="#2ECC71" onclick="pickCl(this)" style="background:#2ECC71"></div>
      <div class="cl-opt" data-v="#3498DB" onclick="pickCl(this)" style="background:#3498DB"></div>
      <div class="cl-opt" data-v="#9B59B6" onclick="pickCl(this)" style="background:#9B59B6"></div>
      <div class="cl-opt" data-v="#E74C3C" onclick="pickCl(this)" style="background:#E74C3C"></div>
      <div class="cl-opt" data-v="#1ABC9C" onclick="pickCl(this)" style="background:#1ABC9C"></div>
    </div>
    <div class="m-err" id="nf-err"></div>
    <div class="m-btns">

<script>
(function(){

  var PREFIX='v20_';
  var snap={};                 // last value we believe is in the cloud, per key
  // Obtain a pristine fetch (the host page wrapped window.fetch in a way that breaks Headers cloning)
  var cleanFetch=null;
  try{
    var ifr=document.createElement('iframe'); ifr.style.display='none';
    document.documentElement.appendChild(ifr);
    cleanFetch=ifr.contentWindow.fetch.bind(ifr.contentWindow);
    // keep the iframe attached so the fetch stays valid
    window.__kcIframe=ifr;
  }catch(e){ console.warn('[KC cloud] could not get clean fetch',e); }
  var sb=null;
  try{ if(window.supabase) sb=window.supabase.createClient(URL_,KEY_,{auth:{persistSession:false},global: (cleanFetch?{fetch:cleanFetch}:{}) }); }
  catch(e){ console.warn('[KC cloud] client init failed',e); }

  function toStr(v){ return v===null? null : JSON.stringify(v); }

  // ---- 1) FAST preload (sync) so data is present before the app boots ----
  try{
    var xhr=new XMLHttpRequest();

    if(xhr.status>=200 && xhr.status<300){
      JSON.parse(xhr.responseText||'[]').forEach(function(r){
        var s=toStr(r.value);
        if(s!==null){ try{ localStorage.setItem(r.family_key,s); }catch(_){ } }
        snap[r.family_key]=s;
      });
    }
  }catch(e){ /* covered by async catch-up below */ }

  // ---- 2) ASYNC catch-up read via supabase-js (reliable; re-renders if needed) ----
  function pull(cb){
    if(!sb) return cb&&cb();
    sb.from('family_state').select('family_key,value').then(function(res){
      if(res.error){ console.warn('[KC cloud] pull error',res.error); return cb&&cb(); }
      var changed=false;
      (res.data||[]).forEach(function(r){
        var s=toStr(r.value);
        if(snap[r.family_key]!==s){
          if(s===null){ try{localStorage.removeItem(r.family_key);}catch(_){} }
          else { try{localStorage.setItem(r.family_key,s);}catch(_){} }
          snap[r.family_key]=s; changed=true;
        }
      });
      if(changed){ try{ if(typeof window.__kcRerender==='function') window.__kcRerender(); }catch(_){} }
      cb&&cb();
    });
  }

  // ---- 3) PUSH changed local v20_ keys -> cloud via supabase-js upsert ----
  function push(){
    if(!sb) return;
    var rows=[], seen={};
    try{
      for(var i=0;i<localStorage.length;i++){
        var k=localStorage.key(i); if(!k||k.indexOf(PREFIX)!==0) continue;
        seen[k]=1; var v=localStorage.getItem(k);
        if(snap[k]!==v){
          var fid=(/^v20_([^_]+)_/.exec(k)||[])[1]||null;
          var val=null; try{ val=(v===null?null:JSON.parse(v)); }catch(_){ val=v; }
          rows.push({family_key:k, family_id:fid, value:val, updated_at:new Date().toISOString()});
          snap[k]=v;
        }
      }
      Object.keys(snap).forEach(function(k){
        if(k.indexOf(PREFIX)===0 && !seen[k] && snap[k]!==null){
          rows.push({family_key:k, family_id:(/^v20_([^_]+)_/.exec(k)||[])[1]||null, value:null, updated_at:new Date().toISOString()});
          snap[k]=null;
        }
      });
    }catch(e){ console.warn('[KC cloud] scan failed',e); return; }
    if(rows.length){
      sb.from('family_state').upsert(rows,{onConflict:'family_key'}).then(function(res){
        if(res.error) console.warn('[KC cloud] push error',res.error);
      });
    }
  }
  setInterval(push, 2000);
  document.addEventListener('visibilitychange', function(){ if(document.hidden) push(); });
  window.addEventListener('pagehide', push);

  // ---- 4) REALTIME: remote change -> local + re-render ----
  try{
    if(sb){
      sb.channel('kc_fs').on('postgres_changes',{event:'*',schema:'public',table:'family_state'},function(p){
        var row=p.new||p.old; if(!row||!row.family_key) return;
        var s=(p.eventType==='DELETE'||row.value==null)?null:JSON.stringify(row.value);
        snap[row.family_key]=s;
        try{ if(s===null) localStorage.removeItem(row.family_key); else localStorage.setItem(row.family_key,s); }catch(_){}
        try{ if(typeof window.__kcRerender==='function') window.__kcRerender(); }catch(_){}
      }).subscribe();
    }
  }catch(e){ console.warn('[KC cloud] realtime off',e); }

  // Kick an async pull shortly after boot to reconcile anything the sync read missed,
  // then an immediate push so local-only data reaches the cloud right away.
  setTimeout(function(){ pull(function(){ push(); }); }, 800);
})();
</script>
<script>

function toAr(n){return String(n).replace(/\d/g,d=>'٠١٢٣٤٥٦٧٨٩'[d]);}

function getFamData(f){
  const ch   = ls('v20_'+f.id+'_children',[]);
  const bal  = ls('v20_'+f.id+'_bal',{});
  const st   = ls('v20_'+f.id+'_settings',{});
  const tx   = ls('v20_'+f.id+'_tx',[]);
  const cp   = ls('v20_'+f.id+'_cpins',{});
  const sav  = ls('v20_'+f.id+'_savings',[]);
  const pps  = st.ptsPerSar||4;
  const totalPts = Object.values(bal).reduce((s,v)=>s+(v||0),0);
  const savPts   = sav.filter(g=>g.active&&g.status==='approved').reduce((s,g)=>s+(g.savedPts||0),0);
  const now=new Date(), mStart=new Date(now.getFullYear(),now.getMonth(),1);
  const wStart=new Date(now-7*864e5);
  const mTx=tx.filter(t=>{try{return new Date(t.date)>=mStart;}catch{return false;}});
  const mIn  = mTx.filter(t=>t.pts>0).reduce((s,t)=>s+t.pts,0);
  const mOut = Math.abs(mTx.filter(t=>t.pts<0).reduce((s,t)=>s+t.pts,0));
  const mNet = mIn-mOut;
  const wTx  = tx.filter(t=>{try{return new Date(t.date)>=wStart;}catch{return false;}}).length;
  const parentUser=(st.parentUsername||'').trim()||f.name;
  const pin  = String(ls('v20_'+f.id+'_pin',f.pin||'----'));
  const realCash = st.realCashBalance||0;
  const pendTx   = tx.filter(t=>t.status==='pending').length;
  const pendSav  = sav.reduce((s,g)=>s+(g.depositRequests||[]).filter(r=>r.status==='pending').length+(g.withdrawRequests||[]).filter(r=>r.status==='pending').length,0);
  return {ch,bal,st,tx,cp,sav,pps,totalPts,savPts,mIn,mOut,mNet,txCount:tx.length,wTx,
          sar:(totalPts/pps).toFixed(2), totalSar:(totalPts/pps).toFixed(2),
          parentUser,pin,realCash,pendTx,pendSav};
}

  const totSar=(totPts/avgPps).toFixed(0);
  const totSavSar=Math.round(totSavPts/avgPps);

    const d=getFamData(f);

// ── Admin action functions ──────────────────────────
function admSaveParentCredentials(famId){
  const families=ls(FK,[]);
  const f=families.find(x=>x.id===famId);
  if(!f)return;
  const name=el('pe-name-'+famId)?.value.trim();
  const user=el('pe-user-'+famId)?.value.trim().toLowerCase();
  const pass=el('pe-pass-'+famId)?.value.trim();
  if(!name||!user||!pass){alert('⚠️ أكمل البيانات');return;}
  if(pass.length<4){alert('⚠️ كلمة المرور 4 أحرف على الأقل');return;}
  f.name=name; f.pin=pass;
  ss(FK,families);
  ss('v20_'+famId+'_pin',pass);
  const st=ls('v20_'+famId+'_settings',{});
  st.parentUsername=user;
  ss('v20_'+famId+'_settings',st);
  switchTab('parents',document.querySelector('.tab.active'));
  alert('✅ تم حفظ البيانات');
}

function admSaveFamSettings(famId){
  const pps=parseInt(el('pe-pps-'+famId)?.value)||4;
  const budget=parseFloat(el('pe-budget-'+famId)?.value)||0;
  const st=ls('v20_'+famId+'_settings',{});
  st.ptsPerSar=pps; st.realBudget=budget;
  ss('v20_'+famId+'_settings',st);
  alert('✅ تم حفظ الإعدادات');
}

function admSetActive(famId,val){
  const families=ls(FK,[]);
  const f=families.find(x=>x.id===famId);
  if(f){f.active=val;ss(FK,families);}
}

function admSetSetting(famId,key,val){
  const st=ls('v20_'+famId+'_settings',{});
  st[key]=val;
  ss('v20_'+famId+'_settings',st);
}

function admAddChild(famId){
  const name=prompt('اسم الابن / البنت');
  if(!name?.trim())return;
  const ch=ls('v20_'+famId+'_children',[]);
  const avatars=['😊','🌟','🦁','🌺','⚡','🎯','🏆','💎','🚀','🎨'];
  const colors=['#4ECDC4','#FF6B6B','#A8E063','#9B59B6','#3498DB','#E67E22','#2ECC71','#E91E63','#F39C12','#1ABC9C'];
  const idx=ch.length%avatars.length;
  const newChild={id:'ch_'+Date.now(),name:name.trim(),av:avatars[idx],color:colors[idx],username:name.trim().toLowerCase().replace(/\s/g,'')};
  ch.push(newChild);
  const cp=ls('v20_'+famId+'_cpins',{});
  cp[newChild.id]='1111';
  const bal=ls('v20_'+famId+'_bal',{});
  bal[newChild.id]=0;
  ss('v20_'+famId+'_children',ch);
  ss('v20_'+famId+'_cpins',cp);
  ss('v20_'+famId+'_bal',bal);
  switchTab('parents',document.querySelector('.tab.active'));
}

function admSaveChild(famId,childId){
  const name=el('ce-name-'+famId+'-'+childId)?.value.trim();
  const user=el('ce-user-'+famId+'-'+childId)?.value.trim().toLowerCase();
  const pass=el('ce-pass-'+famId+'-'+childId)?.value.trim();
  if(!name)return;
  const ch=ls('v20_'+famId+'_children',[]);
  const kid=ch.find(c=>c.id===childId);
  if(!kid)return;
  kid.name=name; kid.username=user||name.toLowerCase();
  ss('v20_'+famId+'_children',ch);
  if(pass&&pass.length>=4){
    const cp=ls('v20_'+famId+'_cpins',{});
    cp[childId]=pass;
    ss('v20_'+famId+'_cpins',cp);
  }
  alert('✅ تم حفظ بيانات '+name);
  switchTab('parents',document.querySelector('.tab.active'));
}

function admRemoveChild(famId,childId){
  if(!confirm('حذف هذا الابن نهائياً؟'))return;
  let ch=ls('v20_'+famId+'_children',[]);
  ch=ch.filter(c=>c.id!==childId);
  const bal=ls('v20_'+famId+'_bal',{});
  delete bal[childId];
  ss('v20_'+famId+'_children',ch);
  ss('v20_'+famId+'_bal',bal);
  switchTab('parents',document.querySelector('.tab.active'));
}

function admResetFamData(famId){
  if(!confirm('مسح جميع بيانات الأسرة (المعاملات والأرصدة)؟ لا يمكن التراجع!'))return;
  ss('v20_'+famId+'_tx',[]);
  ss('v20_'+famId+'_bal',{});
  ss('v20_'+famId+'_savings',[]);
  ss('v20_'+famId+'_hist',[]);
  ss('v20_'+famId+'_notifs',[]);
  alert('✅ تم مسح بيانات الأسرة');
  switchTab('parents',document.querySelector('.tab.active'));
}


// ─── PAGE: USERS ─────────────────────────────────────
function renderUsers(){
  const families=ls(FK,[]);const rows=[];
  families.forEach(f=>{const d=getFamData(f);
    rows.push({name:'الوالدان',fam:f.name,user:d.parentUser,role:'والدان',color:f.color,pass:d.pin,icon:f.icon,pts:'—'});
    d.ch.forEach(ch=>rows.push({name:ch.name,fam:f.name,user:(ch.username||ch.name).toLowerCase(),role:'ابن',color:ch.color,pass:d.cp[ch.id]||'----',icon:ch.av,pts:toAr(d.bal[ch.id]||0)}));
  });
  el('pg-users').innerHTML=`
  <div class="pg-title">🔑 جميع المستخدمين</div>
  <div class="pg-sub">${toAr(rows.length)} مستخدم مسجّل في النظام</div>
  <div class="card">
    <div style="overflow-x:auto"><table class="tbl">
      <thead><tr><th>المستخدم</th><th>اسم الدخول</th><th>كلمة المرور</th><th>الأسرة</th><th>الرصيد</th><th>الدور</th></tr></thead>
      <tbody>${rows.map(r=>`<tr>
        <td><div style="display:flex;align-items:center;gap:7px">
          <div style="width:30px;height:30px;border-radius:9px;background:${r.color}15;display:flex;align-items:center;justify-content:center;font-size:1rem">${r.icon}</div>
          <span style="font-weight:700;color:${r.color};font-size:.78rem">${r.name}</span>
        </div></td>
        <td style="font-size:.72rem;color:var(--muted2);direction:ltr;text-align:right">@${r.user}</td>
        <td style="direction:ltr;text-align:right"><span style="font-size:.8rem;font-weight:700;letter-spacing:3px;color:var(--gold)">${r.pass}</span></td>
        <td style="font-size:.72rem">${r.fam}</td>
        <td style="font-weight:700;font-size:.78rem">${r.pts}</td>
        <td><span class="badge ${r.role==='والدان'?'badge-gold':'badge-blue'}">${r.role}</span></td>
      </tr>`).join('')}
      </tbody>
    </table></div>
  </div>`;
}

// ─── PAGE: SETTINGS ──────────────────────────────────
function renderSettings(){
  const admU=ls(AUK,'admin');
  el('pg-settings').innerHTML=`
  <div class="pg-title">⚙️ إعدادات النظام</div>
  <div class="pg-sub">إعدادات حساب الإدارة والنظام</div>
  <div class="card">
    <div class="card-hdr" style="color:var(--orange)"><span>🔐 بيانات حساب الإدارة</span></div>
    <div class="card-body">
      <div style="font-size:.68rem;color:var(--muted2);margin-bottom:14px;padding:10px;background:rgba(245,197,24,.05);border-radius:9px;border:1px solid rgba(245,197,24,.15)">
        اسم المستخدم الحالي: <strong style="color:var(--gold)">@${admU}</strong>
      </div>
      <div class="m-field"><label class="m-label">اسم مستخدم جديد (اتركه فارغاً للإبقاء)</label>
        <input class="m-input" id="new-adm-u" autocapitalize="off" placeholder="@admin"></div>
      <div class="m-field"><label class="m-label">كلمة مرور جديدة (اتركها فارغة للإبقاء)</label>
        <input class="m-input" id="new-adm-p" type="password" placeholder="••••"></div>
      <button onclick="saveAdmCreds()" style="border:none;border-radius:10px;padding:11px 20px;background:linear-gradient(135deg,var(--orange),#c0392b);color:#fff;font-family:'Cairo',sans-serif;font-size:.82rem;font-weight:700;cursor:pointer">💾 حفظ بيانات الإدارة</button>
    </div>
  </div>
  <div class="card" style="border-color:rgba(255,51,85,.2)">
    <div class="card-hdr" style="color:var(--red)"><span>⚠️ منطقة الخطر</span></div>
    <div class="card-body">
      <button onclick="exportAll()" style="width:100%;border:1px solid rgba(41,121,255,.3);border-radius:10px;padding:10px;background:rgba(41,121,255,.08);color:var(--blue);font-family:'Cairo',sans-serif;font-size:.8rem;font-weight:700;cursor:pointer;margin-bottom:8px">📤 تصدير نسخة احتياطية من جميع البيانات</button>
    </div>
  </div>`;
}

// ─── ACTIONS ──────────────────────────────────────────
function toggleActive(famId){
  const f=ls(FK,[]);const fam=f.find(x=>x.id===famId);if(!fam)return;
  fam.active=!fam.active;ss(FK,f);renderFamilies();showToast(fam.active?'✅ تم تفعيل الأسرة':'⏸️ تم إيقاف الأسرة');
}
function deleteFam(famId){
  const f=ls(FK,[]);const fam=f.find(x=>x.id===famId);if(!fam)return;
  if(!confirm('حذف أسرة "'+fam.name+'" نهائياً؟ لا يمكن التراجع!'))return;
  ss(FK,f.filter(x=>x.id!==famId));renderFamilies();showToast('🗑️ تم الحذف');
}
function openEditParent(famId){
  _fam=famId;
  const f=ls(FK,[]).find(x=>x.id===famId);if(!f)return;
  const d=getFamData(f);
  el('ep-name').value=f.name;
  el('ep-user').value=d.parentUser;
  el('ep-pass').value='';
  el('ep-err').textContent='';
  el('md-ep-title').textContent='✏️ تعديل حساب أسرة '+f.name;
  el('md-edit-parent').classList.add('show');
  setTimeout(()=>el('ep-name').focus(),200);
}
function saveEditParent(){
  const famId=_fam;
  const name=el('ep-name').value.trim();
  const user=el('ep-user').value.trim().toLowerCase();
  const pass=el('ep-pass').value.trim();
  const err=el('ep-err');
  if(!name){err.textContent='⚠️ أدخل اسم الأسرة';return;}
  if(!user){err.textContent='⚠️ أدخل اسم المستخدم';return;}
  // Check duplicate username
  const allFams=ls(FK,[]);
  const dup=allFams.find(f=>{const d=getFamData(f);return d.parentUser===user&&f.id!==famId;});
  if(dup){err.textContent='❌ اسم المستخدم مستخدم في أسرة أخرى';return;}
  const f=allFams.find(x=>x.id===famId);if(!f)return;
  f.name=name;
  if(pass){if(pass.length<4){err.textContent='⚠️ كلمة المرور 4 أحرف على الأقل';return;}f.pin=pass;ss('v20_'+famId+'_pin',pass);}
  ss(FK,allFams);
  const st=ls('v20_'+famId+'_settings',{});st.parentUsername=user;ss('v20_'+famId+'_settings',st);
  closeModal('md-edit-parent');
  renderParents();
  showToast('✅ تم حفظ بيانات '+name);
}
function openAddFam(){
  el('nf-name').value='';el('nf-user').value='';el('nf-pass').value='';el('nf-err').textContent='';
  document.querySelectorAll('.ic-opt').forEach((x,i)=>x.classList.toggle('sel',i===0));
  document.querySelectorAll('.cl-opt').forEach((x,i)=>x.classList.toggle('sel',i===0));
  el('md-add-fam').classList.add('show');
  setTimeout(()=>el('nf-name').focus(),200);
}
function createFam(){
  const name=el('nf-name').value.trim(),user=el('nf-user').value.trim().toLowerCase(),pass=el('nf-pass').value.trim();
  const err=el('nf-err');
  if(!name){err.textContent='⚠️ أدخل اسم الأسرة';return;}
  if(!user){err.textContent='⚠️ أدخل اسم المستخدم';return;}
  if(!pass||pass.length<4){err.textContent='⚠️ كلمة المرور 4 أحرف على الأقل';return;}
  const all=ls(FK,[]);
  const dup=all.find(f=>{const d=getFamData(f);return d.parentUser===user;});
  if(dup){err.textContent='❌ اسم المستخدم مستخدم مسبقاً';return;}
  const icon=document.querySelector('.ic-opt.sel')?.dataset?.v||'👨‍👩‍👧‍👦';
  const color=document.querySelector('.cl-opt.sel')?.dataset?.v||'#E9C46A';
  const famId='fam_'+Date.now();
  all.push({id:famId,name,icon,color,pin:pass,createdAt:Date.now(),active:true});
  ss(FK,all);
  ss('v20_'+famId+'_pin',pass);
  ss('v20_'+famId+'_settings',{ptsPerSar:4,autoCredit:true,realBudget:0,realCashBalance:0,parentUsername:user,childAllocations:{},bankLedger:[]});
  ss('v20_'+famId+'_children',[]);
  ss('v20_'+famId+'_tables',[{id:'tbl1',name:'المهام',icon:'📋',active:true,tasks:[],rooms:[]}]);
  ss('v20_'+famId+'_bal',{});ss('v20_'+famId+'_tx',[]);ss('v20_'+famId+'_cpins',{});
  ss('v20_'+famId+'_savings',[]);ss('v20_'+famId+'_offers',[]);
  closeModal('md-add-fam');
  renderFamilies();
  showToast('✅ تم إنشاء أسرة '+name);
}
function saveAdmCreds(){
  const u=el('new-adm-u').value.trim().toLowerCase();
  const p=el('new-adm-p').value.trim();
  if(!u&&!p){showToast('⚠️ لم يتم تغيير شيء');return;}
  if(u)ss(AUK,u);
  if(p){if(p.length<4){showToast('❌ كلمة المرور 4 أحرف على الأقل');return;}ss(APK,p);}
  el('new-adm-u').value='';el('new-adm-p').value='';
  showToast('✅ تم حفظ بيانات الإدارة');renderSettings();
}
function exportAll(){
  const families=ls(FK,[]);
  const data={exported:new Date().toISOString(),families};
  families.forEach(f=>{data[f.id]={};
    ['pin','cpins','children','tables','bal','tx','settings','savings','offers'].forEach(k=>{
      try{data[f.id][k]=ls('v20_'+f.id+'_'+k,null);}catch{}});});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));
  a.download='bank_backup_'+Date.now()+'.json';a.click();
  showToast('📤 تم تصدير النسخة الاحتياطية');
}
function pickIc(el_){document.querySelectorAll('.ic-opt').forEach(x=>x.classList.remove('sel'));el_.classList.add('sel');}
function pickCl(el_){document.querySelectorAll('.cl-opt').forEach(x=>x.classList.remove('sel'));el_.classList.add('sel');}
function closeModal(id){el(id).classList.remove('show');}
</script>
